body:
  text: 卷之一全按養生之法有四曰寡欲曰慎動曰法時曰卻疾夫寡欲者謂堅忍其性也慎動者謂保定其氣也法時者謂和於陰陽也卻疾者謂慎於醫藥也堅忍其性則不壞其根矣保定其氣則不疲其枝矣和於陰陽則不犯其邪矣慎於醫藥則不遇其毒矣養生之要何以加於此哉寡欲第一夫食色性也故飲食男女人之大欲存焉口腹之養軀命所關不孝有三無後為大此屋廬子之無解於任人難也設如方士之說必絶谷必休妻而後可以長生則枵腹之瘠救死不贍使天下之人墜厥宗者非不近人情者之惑歟孔子曰少之時血氣未定戒之在色蓋男子八歲腎氣實髮長齒更二八腎氣盛精氣溢焉精者血之液氣者精之導也少之時氣方盛而易溢當此血氣盛加以少艾之慕欲動情勝交接無度譬如園中之花早發必先痿也況稟受怯弱者乎古人三十而娶其慮深矣古男子三十而娶女子二十而嫁大衍之數五十天地之中數也陽數二十五陰數二十五男子三十而娶因其陽常不足故益之以五女子二十而嫁因其陰常有餘故損之以五也是故長男在上少女在下則震兌交而為歸妹也少男在上長女在下則艮巽交而為蠱也歸妹之吉帝乙以之蠱之凶晉候之疾不可為也人能知七損八益則形與神俱而盡終其天年不知此者早衰之道也何謂七損八益蓋七者女子之數也其血宜瀉而不宜滿八者男子之數也其精宜滿而不宜瀉故治女子者當耗其氣以調其血不損之則經閉而成病矣男子者當補其氣以固其精不益之則精涸而成疾矣古人立法一損之一益之制之於中使氣血和平也八益丸男子常服補氣固精熟地黃酒拌九蒸九曬焙乾忌鐵器八兩黃柏去皮鹽水炒褐色四兩知母去毛皮四兩蓮肉去心二兩芡實肉二兩共為細末煉蜜杵千餘下如梧子大每服五十丸空心食前溫酒下以米膳壓之忌蘿蔔七損丸女子宜服抑氣調血香附米童便浸三日一日一換取起舂爛焙乾淨一斤當歸酒洗四兩川芎六兩為細末酒煮糊面為丸如梧桐子大每服五十丸空心食前茴香湯送下今之男子方其少也未及二八而御女以通其精則精未滿而先瀉五臟有不滿之處他日有難形狀之疾至於半衰其陰已痿求女強合則隱曲未得而精先泄矣及其老也其精益耗復近女以竭之則腎之精不足取給於臟腑臟腑之精不足取給於骨髓故臟腑之精竭則小便淋痛大便乾澀髓竭則頭傾足軟腰脊痠痛尸居於氣其能久乎故呂純陽仙翁有詩云二八佳人體如酥腰間伏劍斬愚夫分明不見人頭落暗裡教君髓骨枯其男子傷精病小便淋痛大便乾澀者以腎開竅於二陰前溺塞者氣病也後陰病難者血病也宜補其氣則津液行而溺自長補其血則幽開通而便自潤也宜補腎利竅丸主之熟地黃制四兩生地黃當歸川芎白芍各二兩山藥一兩半丹皮去心白茯苓各一兩五味桂心各五錢人參七錢煉蜜為丸梧桐子大每服五十丸空心食前溫酒下男子夢交而泄精女子夢交而成孕或有淫氣相感妖魅為祟神志昏惑魂魄飛揚日久不愈如顛如狂乃召巫覡以逐之抑末矣苟非得道如許旌陽薩守堅者必不能驅治之也惟務誠子螢火丸方可除也上三條皆不能清心寡欲之病螢火丸主闢疾病瘟疫惡氣百鬼邪祟五兵盜賊螢火鬼箭削取皮羽白蒺藜各一兩雄黃雌黃各二兩礬石枯二兩羚羊角煅灶灰各一兩半鐵錘柄入鐵處燒焦一兩半為末以雞子黃及丹雄雞頭一個毛無間色者搗和為丸如杏仁大樣做作三角以絳囊盛之帶在左臂或掛在戶上若從軍者繫於腰中勿離其身孟子曰養心莫善於寡欲寡之者節之也非若佛老之徒棄人倫滅生理也構精者所以續綱常也寡欲者所以養性命也豫常集廣嗣紀要一修德二寡欲然則寡欲者其延齡廣嗣之大要乎豫嘗讀易澤上有水曰節滿而不溢中雖悅慕若險在前心常恐陷節之時義大矣哉若或反之水在澤下則以漸滲泄其涸也可立而待矣困於坎中猶有悅心困而又困雖有盧扁不可治也生人所欲也所欲復有甚於生者乎死人所惡也所惡復有甚於死者乎惟其溺於聲色之中蠱惑狂悖由是而生有不用也由是而死有不闢也詩云士也罔極二三其德此之謂也有人於此嘗語人曰欲不可縱縱欲成災樂不可極樂極生哀可謂知養生矣至於暗居獨處之時目有所接心火焰起雖有災害亦莫之顧故曰寡欲只在謹獨今之養生者曰心神之主也腎者精之府也脾者穀氣之本也三者交養可以長生苟神太煩則困精太用則竭谷太傷則減雖有補益之功不能勝其旦暮之牿矣廣成子曰服藥千朝不如獨宿一宵誠哉是言也今指利刃語人曰是可蹈乎曰不可指鴆毒語人曰是可咽乎曰不可因語人曰佳麗之色利於刃也膏粱之味毒於鴆也遠而疏之不可狎也則群笑而起一朝病生迎醫治之貺以百金不愛也噫曲突徒薪無恩澤焦頭爛額為上客其此之謂也夫男子十六而精通至六十四歲而精竭女子十四而經行至四十九歲而經斷初生之時形體雖具精血猶未生也必待乳哺之養水穀之氣日生月長男子十六而精始溢女子十四而血乃瀉成之何其難也男子八八而精竭女子七七而血盡敗之何其易耶夫以十年所生之精血尚不滿於百半之用譬諸草木氣聚於春者覆敗於秋也雖欲留之只有許多分數況以難成易敗之精血不知愛惜反暴棄之此所以不待八八七七之期而早斃矣交接多則傷筋施泄多則傷精肝主筋陰之陽也筋傷則陽虛而易痿腎主精陰中之陰也精傷則陰虛而易舉陰陽俱虛則時舉時痿精液自出念慮雖萌隱曲不得矣當是時也猛省起來遠色斷想移神於清淨法界歌舞以適其情穀肉以養其身上藥以補其虛則屋破猶堪補矣苟不悔悟以妄為常乃求興陽之藥習鑄劍之術則天柱折地維絶雖有女媧氏之神終不能起冢中之枯骨也今人好事者以御女為長生之術如九一採戰之法謂之奪氣歸元還精補腦不知渾濁之氣渣滓之精其機已發如蹶張之弩孰能御之耶己之精自不能制豈能採彼之精氣耶或謂我神不動以採彼之氣不知從入之路何在也因此而成淋漓者有之或謂我精欲出閉而不泄謂之黃河逆流謂之牽轉白牛不知停蓄之處為疽為腫者有之非以養生適以害生也古人有見色不動如鳩摩羅付之受宮人這是鐵漢如何學得必如司馬公之不置姬妾關雲長之屏美女劉琦之卻名妹然後可養此心不動也堅白不至而欲自試於磨涅其有不磷緇者幾希項羽喑啞叱吒千人自廢垓下之變乃與虞姬對泣漢高祖見太公置俎上略無戚容誅戮功臣何其忍也病革之時乃枕戚姬之膝而垂涕焉蘇武在胸奴吞氈齧雪所持節旄盡落而志不屈何其強也乃納胡婦生子雖曰項羽之泣虞姬恨別也漢高祖之泣戚姬防患也蘇武之納胡婦為養也然尤物移人終是不完古人教子舞刀舞劍學文朝習夕遊焉所以涵養德性禁其非心也故能氣質清明德業成就福壽綿長今之人則不然所以福德不及古者遠矣配匹之際承宗祀也婚姻以時成男女也夫婦有別遠情欲也故身無疴疾生子賢而壽今人不知宗祀為重交接以時情欲之感形於戲謔燕婉之私朝暮陽臺故半百早衰生子多夭且不肖也故曰寡欲者延齡廣嗣之第一緊要也內經曰天食人以五氣地食人以五味谷肉菜果皆天地所生以食人者也各有五氣五味人食之先入本臟而後養其血脈筋骨也故五穀為養五畜為助五菜為充五果為益不可過也過則成病矣又曰陰之所生本在五味陰之五宮傷在五味陰者五臟也酸生肝苦生心甘生脾辛生肺咸生腎此五臟之生本在五味也多食酸則傷肝多食苦則傷心多食甘則傷脾多食辛則傷肺多食鹹則傷腎此陰之五宮傷在五味也故五味雖所以養人多食則反傷人也四方之土産不同人之所嗜各隨其土之所産也故東方海濱傍水其民食魚而嗜咸西方金玉之域其民食鮮美而嗜脂肥北方高陵之域其民野處而食乳酪南方卑濕之域其民嗜酸而食鮒中央之地四方輻輳其民食雜故五域之民喜食不同若所遷其居變其食則生病矣孔子養生之傋衛生之嚴其飲食之節萬世之法程也何必求之方外哉孔子之慎疾曰肉雖多不使勝食氣尚淡泊也不為酒困慎禮節也不多食示儉約也平日之養生者無所不慎如此故康子饋藥則不嘗自信其無疾也子路請禱則不聽自知其不獲罪於天也苟不能自慎而獲罪於天雖巫醫何益人之性有偏嗜者何如魯晢嗜羊棗之類是也然嗜有所偏必生有所偏之疾觀其多嗜鷓鴣常食鳩子者發皆咽喉之病使非聖醫知為半夏之毒急以生薑解之則二人未必不以所嗜喪其生也飲食自倍脾胃乃傷自倍者過於常度也腸胃者水穀之所藏也飲食多少當有分數苟過多則腸胃狹小不能容受不能容受則或溢而上出不上出則停於中而不行水不行則為蓄水食不化則為宿食蓄水宿食變生諸病邵子曰爽口物多終作疾快心事過必為殃豈虛語哉因而大飲則氣逆飲者酒也味甘辛苦氣大熱苦入心而補腎辛入肺而補肝甘入脾和氣血而行榮衛詩云為此春酒以介眉壽酒者誠養生之不可闕古人節之於酒器以示警曰爵者有差等也曰鍾者中也卮之象觴云有傷之義猶舟以載物亦可以覆物也若因而大飲是不知節矣大飲則醉醉則肺先受傷肺主氣肺受傷則氣上逆而病吐衄也豈不危乎豈不傷乎信哉顛覆而殺身矣酒雖可以陶情通血脈然耗氣亂神爛腸胃腐脅莫有甚於此者故禹惡脂酒周公作酒誥衛武公誦賓筵諄諄乎戒人不可沉湎於酒也彼昏不知一醉日富丹溪云醇酒宜涼飲醇酒謂不濃不淡氣味之中和者也涼謂微涼也昔司馬公晚年得一侍妾問其所能答曰能暖酒即是此意蓋胃喜寒而惡熱脾喜溫而惡寒醇酒涼飲初得其涼以養胃次得其溫以養脾人之喜飲熱酒者善病胃脘痛此熱傷胃瘀血作痛也喜飲冷酒者善病腹痛不嗜食而嘔寒傷脾也夫寒凝海惟酒不冰酒入氣中無竅孔得出仲景云酒客中風不可服桂枝湯謂有熱也夫中風乃宜桂枝之症而以桂枝為禁何也以酒也日醇於酒寧無嘔血之病乎今人病酒者與傷寒相似切不可誤作傷寒治之反助其熱亦不可以苦寒之藥攻之蓋酒性之熱乃無形之氣也非汗之何以得散酒體之水乃有形之質也非利之何以得泄乎故宜以葛花解酲湯主之所謂上下分消以去其濕也葛花白豆蔻砂仁各五錢木香五分青皮三錢陳皮人參白茯苓豬苓各一錢半白朮神麯澤瀉乾生薑各二錢為細末每服三錢白湯調下但得發汗酒病去矣酒客病酒酒停不散清則成飲濁則成痰入於肺則為喘為咳入於心則為心痛為怔忡為噫入於肝則脅痛為小腹滿痛為嘔苦汁為目昧不明入於脾為脹為腫為吞酸為健忘入於腎為溺澀赤白濁為腰痛為背惡寒入於胃為嘔吐為泄痢為胃脘當心而痛有諸症疾種種難名不亟去之養虎為患以十棗湯主之只一劑根株悉拔勿畏其峻而不肯服書曰若藥不瞑眩厥疾弗瘳芫花炒研末甘遂末大戟末強者三分弱者折半大棗肥者十個水一鍾半煮棗至八分去棗入藥末攪勻服之得快下清水其病去矣不動再作一服動後糜粥自養因而飽食筋脈橫解腸癖為痔飽食者太過也食過常分則飽飽則腸滿滿則筋脈皆橫則解散不相連屬矣腸癖者泄利也痔者積也腸癖為痔即便血也近則為痢久則為脾泄為腸風為臟毒矣脾者卑職也乃卒伍使令之職以司轉輸傳化者也故脾謂之使胃者倉廩之腑乃水穀之所納出故胃謂之市人以穀氣為主者脾胃是也脾胃強則穀氣全脾胃弱則穀氣絶全谷則昌絶谷則亡人於脾胃可不知所養乎養脾胃之法節其飲食而已脾胃者土也土寄旺於四季脾胃寄養於四臟故四時非土無以成生長收藏之功四臟非土無以備精氣筋脈之化然有陽土有陰土者陰土坤也萬物之所歸藏也陽土艮也萬物之所以成始成終也陰土陽土非戊己之謂也陽土備化陰土司成受水穀之入而變化者脾胃之陽也散水穀之氣以成榮衛者脾胃之陰也苟得其養無物不長苟失其養無物不消此之謂也古人制食早曰昕食晏曰旰食夕曰晡食謂之三餐三餐之外不多食也孫真人曰早晨一碗粥飯莫教人足恐其過飽傷脾胃也周禮曰樂以侑食故有初飯亞飯三飯四飯之官脾好樂管絃之音一通於耳脾即磨矣叔和云磨谷能消食是以聲音皆出於脾夏月戒晚食者以夜短難消化也五味稍薄則能養人令人神爽稍多隨其臟腑各有所傷故酸多傷脾辛多傷肝咸多傷心苦多傷肺甘多傷腎此乃五行之理初傷不覺久則成患也古人食必兼味者相因欲其和也無放飯無流啜者節之禮謹防其過也凡人食後微覺胸中不快此食傷也即服消導之劑以助脾之傳化不可隱忍久則成積矣加味二陳湯主之橘紅白茯苓各七分半夏制一錢炙甘草三分川芎蒼朮白朮各八分山楂肉一錢半砂仁五分神麯另研末炒七分香附一錢上除麥蘖炒為末另包余藥細切水二盞姜三片大棗三枚煎一鍾去渣調上神麯麥芽末服之凡有喜嗜之物不可縱口常念病從口入惕然自省如上古之人飢則求食飽則棄余可也苟不知節必饜足而後止則氣味之偏害其中和之氣傳化之遲斯成菀莝之積矣為闢為滿為痛縱一時之欲貽終身害善養生者固如是乎即當明以告醫攻去之可也宜分冷積熱積用原物湯攻而去之如傷肉食麵食辛辣厚味之物此熱積也宜三黃枳朮丸原物湯即以所傷之物同韭菜搗爛作團火燒存性取起研細煎湯作引故曰原物湯又曰溯源湯送三黃枳朮丸黃芩酒洗黃連酒洗大黃濕紙包煨焙乾各一兩神麯橘皮白朮各七錢半枳實麩炒五錢為細末湯浸蒸餅為丸如緑豆大每服五十丸食前服如傷瓜桃生冷冰水之類此冷積也宜木香清積丸即以所食生冷物用韭菜同搗作丸如前法煎下木香清積丸木香去苞益智仁各二錢青皮陳皮各三錢三稜煨莪朮煨各五錢牙皂燒存性一錢半巴豆肉醋煮乾另研五錢為末醋打麵糊為丸緑豆大每服二十丸至三十丸食前服凡人早行宜飲醇酒一二杯或食糜粥不可空腹而出者昔三人晨行一人飲酒一人食飯一人空腹後空腹者死食飯者病飲酒者無恙凡辛熱香美炙煿煎炒之物必不可食多食令人發癰內經云膏粱之變足生大疔足太過也大疔疽之最毒者凡人發疽如麻如豆不甚腫大惟根腳堅硬如石神昏體倦煩躁不安食減嗌乾即疔毒也其外如麻其里如瓜宜真人活命散主之多多益善瓜蔞根一錢甘草節乳香各一錢穿山甲蛤粉炒三大片赤芍白芷貝母各一錢防風七分沒藥皂角各五分歸尾酒洗金銀花三錢大黃酒煨一錢木鱉肉八分用金華酒二盞煎服服藥後再飲酒數杯以助藥力體重者加黃耆一錢減大黃五分大便溏者勿用大黃
