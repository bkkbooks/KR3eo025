body:
  text: 卷之二慎動第二易曰吉凶悔吝生乎動動以禮則吉動不以禮則凶君子修之吉小人悖之凶悔者吉之萌吝者凶之兆君子修之吉也小人悖之凶也周子曰君子慎動養生者正要在此體認未動前是甚麼氣象到動時氣象比未動時何如若只一樣子便是天理若比前氣象少有差訛便是人欲須從此處慎將去卻把那好生惡死的念頭莫要一時放空才好慎動者吾儒謂之主敬老氏謂之抱一佛氏謂之觀自在總是慎獨工夫獨者人所不知而己所獨知之處也方其靜也即喜怒哀樂未發時所謂中也與天地合其德與日月合其明與四時合其序與鬼神合其吉凶君子於此戒慎乎其所不睹恐懼乎其所不聞不使離於須臾之頃而違天地日月四時鬼神也及其動也正是莫見莫顯之時如喜怒哀樂發開中節這便是和和者與中無所乖戾之謂也略有不和便是不中其違於天地日月四時鬼神遠矣到此地位工夫尤難君子所以尤加戒謹於獨也故曰君子而時中廣成子曰必清必靜無勞汝形無搖汝精乃可長生莊子曰夫失性有五一曰五色亂目使目不明二曰五聲亂耳使耳不聰三曰五臭熏鼻困惱中顙四曰五味濁口使口厲爽五曰趣心滑心使心飛揚此五者皆性之害也人之性常靜動處是情人之性未有不善乃若其情則有不善矣心純性情吾儒存心養性老氏修心煉性佛氏明心見性正養此心使之常清常靜常為性情之主悟真篇云西山白虎正猖狂東海青龍不可當兩手捉來令死鬥化成一塊紫金霜謂以此心降伏性情也人身之中只有此心便是一身之主所謂視聽言動者此心也故心常清靜則神安神安則七神皆安以此養生則壽歿世不殆心勞則神不安神不安則精神皆危便閉塞而不通形乃大傷以此養生則殃心之神發乎目則謂之視腎之精發於耳則謂之聽脾之魂發於鼻則謂之臭膽之魄發於口則謂之言是以儉視養神儉聽養虛儉言養氣儉欲養精五色令人目盲者目淫於色則散於色也五聲令人耳聾者耳淫於聲則散於聲也五味令人口爽者口淫於味則散於味也五臭令人鼻塞者鼻淫於臭則散於臭也是故古人目不視惡色耳不聽淫聲者恐其神之散也暴喜傷心暴怒傷肝暴恐傷腎過哀傷肺過思傷脾謂之五傷久視傷血久臥傷氣久坐傷肉久立傷骨久行傷筋謂之五勞所傷視過損明語過損氣思過損神欲過損精謂之四損人有耳目口鼻之欲行住坐臥之勞雖有所傷猶可治也惟王志之發其烈如火七情之發無能解於其懷此神思之病非自己樂天知命者成敗利鈍置之度外不可治也喜傷心恐勝喜恐傷腎思勝恐思傷脾怒勝思怒傷肝悲勝怒悲傷肺喜勝悲所謂一臟不平所勝平之故五臟更相平也百病主於氣也恐則氣上而嘔血喜則氣緩而狂笑悲則氣消而息微思則氣結而神困怒則氣下而溲便遺凡此類者初得病也積久不解或乘其所勝或所不勝者乘之或所勝者反來侮之所生者皆病也故曰他日有難名之疾也凡此五志之病內經有治法但以五行相勝之理治之故悲可治怒以愴惻苦楚之言感之喜可以治悲以謔浪褻狎之言娛之恐可以治喜以迫蹙死亡之言怖之怒可以治思以汙辱欺罔之言觸之思可以治恐以慮彼思此之言奪之凡此五者必詭詐譎怪無所不至然後可動人之耳目易人之視聽若胸中無材負性使氣不能體此五法也人之怒者必因其拂逆而心相背受其汙辱而氣相犯及發則氣急而上逆矣其病也為嘔血為飧泄為煎厥為薄厥為濕厥為胸滿脅痛食則氣逆而不下為喘渴煩心為消痹為耳暴閉筋縱發於外為癰疽宜四物平肝湯主之川芎當歸各五分白芍一錢生地黃三分甘草一錢梔子仁炒七分人參五分香附米童便煮焙焦黑杵碎七分青皮五分瓜蔞根五分阿膠炒三分水一盞煎八分食遠服人之喜者偶有非常之遇乍得非常之福乃發也喜則志揚氣盈意不在人而緩漫矣其病也為笑不休為毛革焦為陽氣不收甚則為狂宜用黃連安神丸主之黃連一兩炙甘草五分梔子仁炒五分共杵和丸如彈子大每服一丸麥冬湯下人之思者謀望之事未成探索之理未得乃思也思則心存不放念久難釋而氣結不行矣其病也為不嗜食口中無味為嗜臥為躁擾不得眠為心下痞為昏瞀為白淫女子不月為長太息為健忘宜加減二陳湯主之陳皮去白白茯苓各一錢半夏制五分甘草三分香附制一錢蒼朮米泔浸七分貝母川芎青皮各五分水一盞生薑三片煎八分食遠服人之悲者或執親之喪而慘切於中或勢位之敗而慨嘆於昔乃悲也悲則哽咽之聲不息涕泣之出不止而氣消矣其病也為目昏為筋攣為肉痹為胸中痛男子為陰縮為溺血女子為血崩宜加味四君子湯主之人參五分白朮五分白茯苓五分炙甘草五分黃耆炙三分麥冬七分桔梗三分水一盞大棗三枚煎七分食後服人之恐者死生之際軀命所關得喪之時榮辱所繫乃恐也恐則神色俱變便溺遺失而氣下矣其病也為心跳為暴下緑水為面熱膚急為陰痿為目失明為舌短為聲喑為骨痠破困脫肉宜定志丸主之熟地黃一兩人參五錢遠志肉白茯苓各七錢酸棗仁桂心柏子仁去殼各三錢共為末煉蜜丸如梧桐子大每服三十丸空心食前溫酒下人之好動者多起於意遂於必留於固成於我意之初猶可慎也至於必則無所忌憚矣故曰人悖之凶者小人而無忌憚也古硯銘云筆之壽以日計墨之壽以月計硯之壽以世計豈非靜者壽而動者夭乎內經曰陰精所奉其人壽陽精所降其人夭抑亦動靜之謂歟湍水無縱鱗風林無寧翼動也動而不止非聚福之道也地下有山謙夫地靜也山在地下安於所止而亦同歸於靜故曰謙謙者盈之反也山在地下則為剝過於盈也故曰天道惡盈而好謙地道虧盈而流謙鬼神禍盈而福謙震動也艮止也震艮者動靜之反也震有𡄼𡄼之象慎也笑言啞啞不喪匕鬯慎之效也艮其背不獲其身行其庭不見其人動亦靜也所以能無咎也慎動者匪真愛身所以愛親身體髮膚父母全而生之子全而歸之孝也魯子曰戰戰兢兢如臨深淵如履薄冰慎之至也見其平日保身之難也而今而後吾知免夫至於歿而後幸其保之全焉慎動主靜之用主靜慎動之體動靜不失其常艮之義也瞽者天下之至明也聾者天下之至聰也其心專一故善視者莫如瞽善聽者莫如聾也觀此則知養生之道矣人之學養生日打坐曰調息正是主靜工夫但到打坐調息時便思要不使其心妄動妄動則打坐調息都只是搬弄如何成得事孟子曰夭壽不二修身以俟之這便是長生祕訣打坐正是養生一件事養生者養其性情也打坐者收斂此心不使放去也豈是呆坐昔達摩面壁九年目無所視耳無所聞口無所語此心常在腔子無思無為不塵不垢所以得成證果承光立雪不動乃見善學達摩處古仙教人打坐說垂其簾塞其兌人學打坐時只說垂簾者微瞑其目不可緊閉也塞其兌者閉口勿吐氣但令鼻呼吸而已曾不知垂其簾者教人勿視也塞其兌者教人勿語也從打坐時做起做得熟時雖不打坐此目常不妄視此口常不妄語自然習與性成此心自不妄動也今之學長生者到打坐時瞑目閉口放下打坐依舊妄視妄語如何收得此心住更有一等方士靜靜打坐做科範心下卻東西南北走去了只當棄下個死尸兀坐在這裡人一身之間目之於色耳之於聲口之於味心之於思紛紛擾擾那得一時休息到得夜來恩愛之纏邪辟之私又無一念自在古仙照見世人苦被魔障所以設法度人教人打坐可以長生此心若是常清常靜雖日夜不眠也當打坐若是不能清靜亦似不能打坐吾常學打坐內觀其心是甚麼樣子只見火焰起來收煞不住乃學古人投豆之法以黑白二豆分善惡不問子後午前但無事便靜坐一時只是心下不得清靜涼快卻又將一件事或解悟經義或思索詩文把這心來拘束才得少定畢竟繫著於物不能脫灑到今十年稍覺得心下涼快一二分雖不拘束他自是收煞得住有一方士嘗教人以打坐法坐定以目觀臍似一團規霎時規中現出景象如春光明媚以鼻徐徐吸之舌齶咽之下於重樓直下丹田如一輪紅日出北海曆尾閭循脊直上泥丸自然神清氣爽此法子亦是守中做得熟時也有受用但道無存相存相是妄無作為作為是惟據其存想景象出入升降如夢如幻不特動其心反把心來沒死了學長生者皆自調息為人道之門命門者息之根本也脈者息之橐禽也口鼻者息之門戶也心者息之主也有呼吸之息有流動之息有止息之息而皆統於腎焉動則息出乎脈靜則息入於腎一動一靜心實主之智者動靜皆調昧者只調其靜至於動息則亂矣故曰今夫蹶者趨者是氣也而反動其心易曰天行健君子以自強不息夫健者陽之德也乾為天純陽之精至大至剛故一日一夜行三百六十五度二百三十五分強其可見者日月之差分四時之行萬物之生長收藏如環無端未嘗一息之停君子體之自強以致其剛大之氣終日乾乾夕陽若與天同運一夕尚存此志不宜少懈詩曰維天之命於穆不已蓋曰天之所以為天也於乎不顯文王之德之純純亦不已純亦不已者緝熙敬止易曰何思何慮書曰思作睿君子非不恩也思無邪思無斁放能至於睿此緝熙敬止之功也不識不知順帝之則文王之德之純也佛家善知識者預知舍宇只緣此心不妄動養得心之本體虛靈不昧自然明睿所照無所障礙今人靜坐正一件吃緊處只怕外若靜而中未免攪攏者六祖盧能既參五祖受衣鉢卻又去從獵者逐獸正是吃緊為人處外若攪擾其中卻靜嘗聞南嶽昔有住山僧每夜必秉燭造檀林衆僧打坐者數百人必拈竹篦痛箠之或袖中出餅果置其前蓋有以窺其中之靜不靜而為之懲勸也人能嘗自懲勸則能自靜故曰心為嚴師素問道經曰至真之要在乎天玄天玄者先天太玄之真息渾淪淵然何思何為形既生矣神發智矣天玄之息泄矣人能忘嗜欲定喜怒一念不動如在母腹之時凝神以養其氣閉氣以固其精使精氣自結名曰聖胎天玄之息自歸其間故曰還元至真之要也人一呼一吸為一息一日一夜凡百刻計一萬三千五百息人身之脈共八百一十丈一呼脈行三寸一吸脈行三寸一息共行六寸一日一夜五十周於身自子初刻至巳終刻行陽二十五度自午初刻至亥終刻行陰二十五度此自然流動之息與天地同運者也故養生者順之則昌逆之則亡每刻至一百三十五息息者氣也人物之生莫不有竅為之出入也惟口鼻之氣有出有入人皆知之若目之氣泄於視耳之氣泄於聽前後二陰之氣泄於便溺玄府之氣泄於沛空人則不知也故儉其視聽節其飲食避其風寒此調氣之要也豈特調其呼吸而已哉善養生者必知養氣能養氣者可以長生故調氣者順其氣也服其氣者納其氣也伏其氣者閉其氣也皆曰養氣今人服氣者則不然乃取童男童女呵其氣而咽之此甚可嘆殊不知天地之氣從鼻而入水穀之氣從口而入利則養人乖則害人此等服氣之法乃是一團濁氣其養人乎其害人乎可以自喻矣養生之訣云調息要調真息真息者胎息也兒在胎中無吸無呼氣自轉運養生者呼吸綿綿如兒在胎之時故曰胎息人之空竅元氣之門戶也塞其竅則病閉其竅則死凡胎生卵生者初在胎谷中空竅閉塞何以不死曰緣這團真氣伏藏於中長養形髓空竅未開不泄及其生也啼聲一發則真氣泄而百竅開矣人之真氣伏藏於命門之中即火也聽命於心以行君火之令故主安則捍吸與天同運不失其常主危則相火衰息逆賁而死至矣故曰南山猛虎一聲雷撼動乾坤橐籥開驚起老龍眠不得轟騰直上九天來方士教人行打坐調息工夫子前進陽火午後退陰符卯酉為沐浴則不行此不知天地之化陰陽之理惑於傍門之教以僞亂其真也入藥鏡云一日內十二時意所到皆可為何曾分子午卯酉也悟真篇云莫向天邊尋子午身中自有一陽生則一念動處便是活子時何必夜半後為子時耶動處便是陽火意動過後便是陰符陰陽者動靜之謂時行則行進陽火也時止則止退陰符也然所謂進退者即一時事祖師不肯說破與人要人自悟我今妄猜云陰陽者善惡之謂也一念之善此陽火發也即其所發而推廣之謂之陽火一念之惡此陰符動也即其方動而屏去之謂之退陰符陽火常進則所存皆善日進於高明便是遷仙道陰符不退則所存皆惡日隱於汙下便是入鬼道卯酉為沐浴卯者陽之中也酉者陰之中也教人用工無太過無不及至於中而止日中則亥月盈則虧古人養生亦以日月沐浴之謂也目者神之舍也目宜常瞑瞑則不昏發者血之餘也發宜常櫛櫛則不結齒者骨之標也齒宜數叩叩則不齲津者心之液也津宜常咽咽則不燥背者五臟之附也背欲常暖暖則肺臟不傷胃者谷之倉廩也腹欲常摩摩則谷不盈頭者清陽之會行住坐臥風雨不可犯也犯則清邪中上竅而頭頂之疾作矣足者濁陰之聚行住坐臥水濕不可犯也犯則濁邪中下竅而腰足之疾作矣養生者宜致思焉卷之三法時第三按內經曰聖人春夏養陽秋冬養陰以從其根故與萬物沉浮於生長之門王太僕注云春食涼夏食寒以養於陽秋食溫冬食熱以養於陰春三月此謂發陳天地俱生萬物以榮夜臥早起廣步於庭披髮緩形以使志生生而勿殺豫而勿奪賞而勿罰此春氣之應養生之道也夏三月此謂蕃秀天地氣交萬物華實夜臥早起無厭於日使志無怒使華英成實使氣得泄若所愛在外此夏氣之應養長之道也秋三月此謂容平天氣以急地氣以明早臥早起與雞俱興使志安寧以緩秋刑收斂神氣使秋氣平無外其志使肺氣清此秋氣之應養收之道也冬三月此謂閉藏水冰地坼無擾乎陽早臥晚起必待日光使志閒逸潛伏隱括去寒就溫無泄皮膚使氣亟奪此冬氣之應養藏之道也凡天地之氣順則和競則逆故能致災咎也所以古先哲王立四時調神之法春則夜臥早起廣步於庭披髮緩形以順其發陳之氣逆則傷脾矣夏則夜臥早起無厭於日使氣得泄以順其蕃秀之氣逆則傷心矣秋則早起與雞俱興收劍神氣以順其容平之氣逆則傷肺矣冬則早臥晏起必待日光無泄皮膚以順其閉藏之氣逆則傷腎矣陰陽和則氣平偏勝則乖乖便不和故春夏養陽也濟之以陰使陽氣不至於偏勝也秋冬養陰也濟之以陽使陰氣不至於偏勝也嘗觀孔子當暑袗絺綌必表而出之冬則狐貉之厚以居公都子曰冬日則飲湯夏日則飲水其法天時可見矣月令春食麥與羊夏食菽與雞秋食麻與犬冬食黍與彘者以四時之食各有所宜也又春木旺以膳膏香助胃夏火旺以膳膏腥助肺秋金旺以膳膏臊助肝冬水旺以膳膏羶助心此所謂因其不勝而助之也自上古聖神繼天立極裁成輔相以贊天地之化育以左右民者其見於經在易之復先王以至日閉關商旅不行安靜以養其陽使之深潛固密而無所泄也在詩之七月二之日鑿冰沖沖三之日納於凌陰四之日其早獻羔祭韭謂藏水發冰以節陽氣之盛使厲氣不降民不夭折也在禮月令冬至則君子齊戒處必掩身身欲寧去聲色禁嗜欲安形性事欲靜以待陰陽之所定在夏至君子齊戒處必掩身毋操擾止聲色毋或進薄滋味毋致和節其嗜欲定心氣聖人之尤民如此故逆天違時者不祥縱欲敗度者有殃禮仲之月春雷先發聲先雷三日奮木鐸以令兆民曰雷先發聲有不戒其容止者生子不肖必有凶災故孔子迅雷風烈必變敬天之威也凡夫婦同寢如遇迅雷光電驟風暴雨日月薄蝕即當整衣危坐待旦不可心志蠱惑敗度敗禮不特生子不肖亦今夭壽禮春夏教以禮樂秋冬教以詩書亦春夏養陽秋冬養陰之法也蓋春生夏長乃陽氣發泄之時教以禮樂者歌詠以養其性情舞蹈以養其血脈亦養陽之道也秋冬收藏乃陰氣收斂之時教以詩書者優遊以求之涵詠以體之亦養陰之道也內經云冬不按蹺春不鼽衄夫按摩蹺引乃方士養生之術冬月固密之時尚不可行以擾乎陽使之極泄則有春鼽衄之疾況以酒為漿以妄為常水冰地坼醉以入房暴泄其陽者乎斯人也春不病溫夏不病飧泄秋不病瘧痎者未之有也今人春月喜服過藥利數行謂之春宣蓋宣者布散之義春月上升之氣或因寒氣所折鬱而不發則宜用升陽之劑或吐劑以助其發生之令故謂之宣若無寒折之變則宣劑亦不必服也豈可下之以犯養生之禁以逆上升之氣也耶此春行秋令肝必受傷至秋乃發病也人到春時多生瘡疥者此由冬月不能固密皮膚使汗易泄寒氣浸之營血凝滯至春發陳變生瘡疥宜加減升麻和氣飲主之升麻葛根赤芍甘草當歸川芎防風白蒺藜炒荊芥生地黃何首烏等分水盞半煎八分溫服乾燥加酒紅花瓜蔞根膿水不幹加黃耆白芷有人但到春來便生瘡者此名風瘡蓋肝者風木也肝藏血欲為膿血此有宿毒故年年發非新病也宜服消毒丸外用灸法則永不發矣烏梢蛇乾者一條用酒浸去皮骨焙取末一兩酒留作糊為丸胡麻炒一兩苦參酒浸三兩白蒺藜炒牛蒡子炒各一兩半共為細末用浸蛇酒煮麵糊為丸如梧桐子大每服五十丸酒送下此方治梅瘡癬及癩瘡極效灸風池二穴曲池二穴各灸三壯春溫夏熱秋涼冬寒此四時之氣也春雖溫多風棉衣不可太薄秋雖涼而寒將至衣褐宜早漸加也曾晢云暮春者春服既成豳風云九月授衣其順天時修人事故宜如此八風者天之號令也常以八節太乙移宮之日必有暴風雨應之太乙常以冬至之日居葉藝之宮在坎正北名大剛風立春日移居天留在艮東北名凶風春分移居倉門在震正東名嬰兒風立夏移居陰樂在巽東南名弱風夏至移居天宮在離正南名大弱風立秋移居玄委在坤西南名謀風秋分移居倉果在兌正西名剛風立冬移居新落在乾西北名折風其風雨之應或先或後自其所居之方來為正風主生長萬物自其所沖之方來為虛邪乃能傷人成病也晝發民多病夜發民少病何以然蓋夜民皆臥故聖人避此虛風之邪如避矢石所以邪弗能害也四時之氣如春風夏暑秋溫冬寒皆能傷人成病不但八風也君子慎之起居有節食色不傷雖有賊風苛毒不能傷也邪之所湊其氣必虛如木腐而蠹生堤穴而水入以身之虛逢天之虛又直上弦前下弦後月廓之空重感於邪謂之三虛如是病者微則篤盛則死矣如春應溫而反寒夏應熱而反涼秋應涼而反熱冬應寒而反溫此天地殺氣非正令也尤宜慎之以免瘟疫之病凡大寒大熱大風大霧皆宜避之不可恃其強健而不畏也詩曰畏天之威於時保之此之謂也人皆曰夏月宜食寒冬月宜食熱殊不知太熱則傷胃太寒則傷脾夏月伏陰在內如瓜桃冰之類不可多食恐秋生瘧痢之疾冬月伏陽在內如辛燥炙煿之物不可多食恐春目痛秋生熱厥所以古人四時節其飲食適其寒溫熱無灼灼寒無滄滄也修養家嘗曰火候火者純陽之陰氣也候者陰氣升降之候曰火候者謂陰氣之升降不可得見觀於七十二候斯可見矣蓋欲於此求之以一年為一月朔後陽漸長至望而極望後陽漸消至晦而極又以一月為一日子後一陽生至巳而極午後一陽消至亥而極又以一日為一時初初刻陽之長也至初四刻而極正初刻陽之消也至正四刻而極又以一時為一息呼出陽之長也吸入陽之消也故天地之大自其不變者觀之只一息耳自其變者而觀之則流散無窮矣春月無暴寒冰雪人有病熱者勿誤作傷寒治之此因冬傷於寒至春發為溫病也仲景云太陽病發熱而渴不惡寒者為溫病可見溫病則不惡寒而渴傷寒則不渴而惡寒也以此辨之春溫病宜用易老九味羌活湯羌活防風蒼朮各一錢半川芎白芷生地黃黃芩甘草各一錢細辛三分渴加知母水煎服此藥不犯禁忌乃解利之神方也夏月有病似外感而飧泄者水穀不化相雜而下或腹痛膿血稠黏此由春傷於風至夏病泄也其水穀不化者宜用良方神朮散蒼朮二錢川芎藁本各七分半羌活五分炙甘草細辛各三分姜三片水盞半煎八分要汗加蔥白如膿血稠黏者用胃風湯人參白茯苓川芎當歸白芍白朮各等分粟米一撮水煎人於夏後有病霍亂吐泄此由內傷生冷得之與上證不同宜用六和湯主之人參半夏杏仁微炒去皮尖炙甘草砂仁各五錢白茯苓藿香木瓜白扁豆炒各二錢厚朴薑汁炒一錢半香薷二錢姜三片水二盞煎服人於夏月日在烈日之中奔走勞役得病此動而得之謂之中熱宜豬苓湯合益元散服之香薷一錢白朮炙甘草各一錢扁豆炒一錢豬苓澤瀉白茯苓厚朴薑汁炒各五分水煎去渣入一元散二錢調服益元散白滑石水飛過六兩半粉草一兩共再篩籮勻聽用人於夏日納涼於高堂廣廈之中得病者此病靜而得之謂之中暑宜用清暑益氣湯主之升麻黃耆蒼朮各一錢神麯炒人參白朮陳皮各五分黃柏炒炙甘草麥門冬去心歸身各六分葛根三分五味九粒澤瀉五分青皮二分水煎服仲景太陽中暍症禁汗下溫針無有治方宜用此方孫真人制生脈散令人夏月服之東垣云夏月用生脈散加黃耆甘草令人有力人參五味麥門冬等分加黃耆炙甘草水煎夏月時時代湯服之有人春末夏初頭痛腳軟飲食少體熱者名曰注夏屬陰虛元氣不足病宜用補中益氣湯去柴胡升麻加炒黃柏白芍更早服大補陰丸晏服參苓白朮丸大效方見下今人好事者夏月用緑豆粉以新薄荷葉蒸制名玉露霜時時食之以解暑毒不知薄荷乃新香發散之藥多食令人虛汗不止秋月人多病瘧者此因夏傷於暑得之暑傷元氣致秋為痎瘧也痎者久也不可輕截宜補中益氣湯主之黃耆人參炙甘草各一錢白朮歸身柴胡升麻陳皮各五分加乾薑青皮各五分水煎服熱多加知母寒多加桂枝無汗去白朮加蒼朮秋月多痢疾者此因夏月內傷生冷至秋陽氣不降乃結澀之物與濕熱之氣同墜下也腹痛窘迫者用加味小承氣湯主之枳實一錢半厚朴薑汁炒一錢半大黃酒煨三錢木香五分檳榔米二錢半水煎服腹痛當止止則積去矣窘迫減則熱除矣宜用加味白芍藥湯和之以平為期白芍一錢人參當歸黃連酒炒黃芩酒炒陳皮各五分木香檳榔炙甘草各三分水煎食後服冬月有病咳嗽者此因秋傷於濕得之宜參蘇飲蘇葉五分葛根陳皮去白前胡各七分半人參半夏制白茯苓各四分枳殼桔梗各三分甘草二分烏梅洗去核一個生薑三片棗三枚水煎食後服大法春宜吐夏宜發汗秋冬宜下此教人治病者不可犯時禁也設遇可吐可汗可下之證雖犯時禁亦為之所謂發表不遠熱攻裡不遠寒也若無病之人春與吐夏與發汗秋冬與下此誅伐無過所謂大惑也春宜吐者順其上升之氣也人之胸中覺有痰積不得不吐者宜用二陳湯加升麻防風桔梗水煎成湯向無風處先以軟布束勒臍腹然後服藥少頃以鵝翎探吐之可以去病且不壞人元氣按子産論晉侯之疾曰君子有四時之調攝朝以聽政晝以訪問夕則靜坐夜則安身於是乎節宣其氣勿使有壅閉湫底以露其體茲心不爽而昏亂百度今無乃一之則生疾矣
