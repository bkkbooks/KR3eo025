body:
  text: 卷之四卻疾第四吾聞上工治未病中工治將病下工治已病治未病者十痊八九治將病者十痊二三治已病者十不救一善治者治皮毛不善治者治骨髓蓋病在皮毛其邪淺正氣未傷可攻可刺病至骨髓則邪入益深正氣將憊針藥無所施其巧矣噫勾萌不折至用斧柯涓涓不絶流為江河是誰之咎歟邵子曰與其病後才服藥孰藥病前能自防即聖人所謂不治已病治未病之謂也夫病已成而後藥之亂已成而後治之譬猶渴而穿井亂而鑄兵不亦晚乎今人有病不即求醫隱忍冀瘥至於病深猶且自諱不以告人誠所謂安其危利其番也一旦病亟然後求醫使醫者亦難以施其治詩云既輸爾載將伯助豫斯之謂乎心印經云生藥三品神與氣精夫大虛之謂神生生之謂氣象形之謂精今人之有身由父母之媾精所生也陽精隨氣以運動陰精藏神而固守內外交養動靜互根神依氣氣依精精歸氣氣歸神故能神與形俱與天地悠久也此之謂上藥五穀為養五畜為助五萊為充五果為益精不足者溫之以氣形不足者補之以味精食氣以榮色形食味以生力味歸氣氣歸精精歸神故亦可以形體不敝精神不散益壽而以百數此之謂中藥水土金石草木昆蟲氣味合而服之可以攻邪如辛涼之藥以攻風邪可使正復此謂之下藥今人棄上藥而不求餌中藥而不知至於有病以下藥為良劑舍爾靈龜觀我朵頤無怪乎斯民之不壽也善養生者當知五失不知保身一失也病不早治二失也治不擇醫三失也喜峻藥攻四失也信巫不信醫五失也東坡嘗曰吾平生求醫蓋於平時驗其工拙至於有疾必先盡告其所患而後診視使醫者瞭然知厥疾之所在虛實冷熱先定於中則脈之疑似不能惑也故雖中醫療疾常愈蓋吾求病愈而已豈以困醫為事哉誠哉斯言真警迷之砭劑也吾常治病以色為先問次之為問者問其所好惡也問其曾服何藥也而與血脈相參制方之時明以告人某藥治某病某藥為佐使庶病者知吾使用之方彼有疑忌者又明以告之有是病必用是藥使之釋然所以偶中者多惜乎吾見自用自專日趨於下無能繼其志者敢曰三世云乎哉治病之法虛則補之實則泄之邪氣盛則實正氣衰則虛瀉者謂攻其邪也攻者汗吐下針灸五法也假如外感風寒不急汗之何以得解內傷飲食不急吐下之何以得解惟虛怯之病貴乎用補不可攻也故攻其邪氣者使邪氣退而正氣不傷此攻中有補也補其正氣者使正氣復而邪氣不入此補中有攻也用藥如用兵師不內御者勝如知其醫之良即以其病付之用而不疑也苟不相信莫若不用吾嘗見病家自稱知醫醫欲用藥則曰某藥何用無以異於教玉人雕琢玉者幸而中則語人曰是吾自治也沒有不效則歸罪於醫矣功則歸已罪則歸人存心如此安望其醫者之用心而致其病之痊乎內經云惡於針石者不可與言至巧惑於鬼神者不可與言至德吾見世人有病專務祈禱此雖胡貊之俗自少昊氏以來民相惑以妖相扇以怪迄今久矣況彼蠻煙障霧之中多魍魎狐蜮之氣民惑於妖性不嗜藥故以禱為主也若五勞六欲之傷七損八益之病必有待於藥耳醫家有龍術王祝由科乃移精變氣之術誠可以治中惡之病傳駐之氣疫癘之災不可廢矣昔有人暑月深藏不出因客至坐於牖下忽以倦怠力疲自作補湯服之反劇醫問其由連進香薷湯兩服而安寶鑑云諺云無病服藥如壁里安柱為害甚大夫天之生物五昧備焉食之以調五臟過則生疾至於五穀為養五果為助五畜為益五菜為充氣味厚而服之以補精血氣倘用之不時食之不節猶或生疾況藥乃攻邪之物無病豈可服哉聖濟經云彼修真者蔽於補養輕耳金石補陽之劑一旦陽劑剛勝病起則天癸竭而榮涸陰劑柔勝病起則真火微而衛散一味偏勝則一臟偏傷安得不病孫真人曰藥勢有所偏助則臟氣不平唐裴濟諫憲宗曰藥以攻疾非朝夕常用之物況金石酷烈有毒又加煉有火氣非人臟腑所能經也唐張桌諫穆宗曰神慮清則血氣和嗜欲多而疚疾作蓋藥以攻疾不可用也韓昌黎銘孝子之墓曰余不知服食説起自何世殺人不可數計而世人慕之至此甚惑也潔古云無疾服藥此無事生事張子和云人之好補者或咨諸庸醫或問諸遊客庸醫以要和相求故所論者輕輕則草木草木者蓯蓉牛膝巴戟菟絲之類遊客以好名自高故所論者重重則金石金石者丹砂陽起石硫黃之類吾不知此以為補者補何臟乎以為補心耶心得熱則瘡瘍之病生矣以為補肝耶肝得熱則神眩之病生矣以為補肺耶肺得熱則病積鬱矣以為補脾耶脾得熱則腫滿矣以為補腎耶腎為癸水其經則子火君火也補腎之火火得熱而益熾補腎之水水得熱而益涸百病交起由無病而補元所得也全按無陽則陰無以長無陰則陽無以化陰陽互用如五色成文而不亂五味相濟而得和也凡養生祛邪之劑必熱無偏熱寒無偏寒溫無聚溫溫多成熱涼無聚涼涼多成寒陰則奇之陽則偶之得其中和此制方之大旨也治寒以熱治熱以寒中病則止勿過其劑也王太僕云攻寒令熱脈不變而熱疾已生制熱令寒脈如故而寒疾又起欲求其適中安可得乎內經曰不遠熱則熱至不遠寒則寒至寒至則堅痞腹滿痛急下利之病生矣熱至則吐下霍亂癰疽瘡瘍瞀郁注下瞤瘈腫脹嘔鼽血頭痛骨變肉痛血泄溢血泄淋閉之病生矣論曰心肺損而色蔽腎肝損而形痿谷不能化而損脾感此病者皆損之病也漸潰之深皆虛勞之疾也夫稟中和之氣而生身曰元精曰元氣曰元神者本身之真精真氣真脈也心之合脈也其神不可見其機見於脈也故曰神機夫真精真氣真脈也其原皆出於腎故曰元丹經所謂水鄉鉛者是也精者五臟之真精也經云腎者主受五臟六腑之精而藏之故五臟盛乃能瀉謂之天癸者天一所生之水也兩腎之間謂之命門難經曰命門者諸神精之所舍原氣之所繫也原氣之出於腎者如此脈之動也者腎間之動氣所發也故人之脈以尺為主如樹之根此真脈之出於腎者如此夫腎者生之本為陰陽之樞紐榮衛之根柢所以有補無瀉也丹溪滋陰大補丸最佳按滋陰大補丸乃六味補腎地黃丸除去丹皮澤瀉合六味煨腎散除青鹽加牛膝五味子石菖蒲甘州枸杞四味共十三味為劑蓋精者木之液也其臟屬肝藏於金里金者水之母也其液屬肺金木交媾變化凝結而腎納之謂之元精即真水也又曰嬰兒悟真篇云金公本是東家子送在西鄰寄體生認得喚來歸舍養配將奼女作親情是也氣者火之靈也其臟屬心聚於膻中膻中者氣之海也其位在肺肺調百脈遊行三焦之中歸於命門謂之元氣即真火也又曰奼女悟真篇云奼女遊行自有方前行雖短後行長歸來卻入黃婆舍嫁個金公作老郎是也黃婆者真土也坎中有戊離中有己故曰只緣彼此懷真土遂使金丹有返還也神者精氣混合之名也故人未生之前精氣自神而生既生之後神資精氣以存心印經云人各有精精合其神神合其氣氣合體真此之謂也滋陰大補丸熟地黃四兩川牛膝去蘆酒洗過山藥各一兩半杜仲薑汁炒去絲巴戟去心山茱萸去核肉蓯蓉酒洗焙五味子白茯苓去皮小茴香炒遠志去心甘草同煎各一兩石菖蒲一寸九節者枸杞各五錢上為細末用紅棗三十六枚蒸去皮核杵爛和煉蜜入藥末杵千餘下為丸如梧桐子大每服五十丸淡鹽湯或溫酒空心送下此方以五味子補肺滋其水之化源山茱萸補肝山藥紅棗補腎脾石菖蒲補心又熟地黃枸杞蓯蓉山茱萸牛膝杜仲以補元精固精山藥紅棗五味小茴以補元氣調氣巴戟遠志石菖蒲白茯苓以補神安神其性味清而不寒溫而不熱溫涼相濟陰陽適調滋補之巧豈金石所能及也丹溪云非深達造化之精微者未足以議此也無極之真二五之精妙合而凝以成男成女者元氣也五穀為養五果為助五畜為益五菜為充者穀氣也腎為元氣之根脾胃為穀氣之主故修真之土所謂先天之氣真水真火者即此元氣也所謂真土為刀圭者即此穀氣也圭者戊己二土也刀者脾之形象也澄心靜慮惜精愛氣者所以養此元氣也飲食必節起居必時者所以養此穀氣也無元氣則化滅無穀氣則神亡二者當相交養也古人制參苓白朮散謂補助脾胃此藥最妙今作丸劑與前滋陰大補相間服之尤佳參苓白朮丸人參白朮白茯苓山藥白扁豆去殼薑汁炒各一兩半炙甘草桔梗薏苡仁蓮肉去皮心各一兩陳皮去白一兩半砂仁一兩煉蜜為丸如彈子大約一錢重每服二丸棗湯化下此方以白朮甘草平肝以人參桔梗補肺茯苓補心山藥補腎乃四君子加山藥蓮肉白扁豆薏苡仁專補脾胃之虛弱橘紅砂仁桔梗以助糟粕去滯壅也夫陰陽者萬物之父母也水火者陰陽之徵兆也坎離者陰陽之定位也心腎者坎離之配合也故水居坎位而腎配坎為陰中之陽火居離位而心配離為陽中之陰心配離離中虛故心虛斯能虛物以腎配坎坎居實故腎實則能全形矣然心雖陽也其中之陰謂之真陰乃水之源也腎雖陰也其中之陽謂之真陽乃火之主也故水為精精中有神益精以全神者謂之水府求玄火為神神中有精存神以固精者謂之離宮修定此心腎之所宜交養也蓋心為手少陰君火腎為足少陰子水少陰者體也水火者用也同體異用古人制方以滋陰大補丸補腎天王補心丹補心藥類氣味其揆一也按易云先庚三日後庚三日庚者更也陽盡消而再長月既魄而復明月出庚方此之謂也先庚三日丁也後庚三日癸也丁者心火也陽之所生謂之天根癸者腎水也陰之所生謂之月窟一陰一陽互為其根故邵子云天根月窟間往來三十六宮都是春此補心補腎之方互為其用也天王補心丹熟地黃白茯苓人參遠志去心甘草水煎石菖蒲玄參柏子仁去殼天冬去心麥冬去心丹參酸棗仁去殼炒炙甘草歸身酒洗杜仲去皮薑汁炒斷絲取末五味各一兩上十五味共為末煉蜜杵為丸如彈子大每丸重一錢金箔為衣每服一丸棗湯化下臨臥食遠服此方熟地黃白茯苓天冬玄參杜仲五味皆補腎之藥也其制方之法以熟地黃當歸五味杜仲益血固精以人參白茯苓柏子仁遠志菖蒲酸棗仁寧心保神除驚悸止怔忡令人不忘以天麥門冬丹參玄參甘草清三焦去煩熱療咽乾此方可與上二方相間服之早服滋陰大補丸晝服參苓白朮散夜服天王補心丹最妙此三方延年之要也夫五臟各一腎獨有兩者以造化自然之理也蓋太極生兩儀一陰一陽之謂也草木初生皆有兩瓣謂之甲坼左曰陽右曰陰故人受形之初便生兩腎東方曰青龍南方曰朱雀西方曰白虎都是一體北方曰玄武乃有二體乃龜蛇二體也蛇屬陽龜屬陰子半以前屬陰龜之體也子半以後屬陽蛇之體也腎者水臟上應北方玄武之象故有兩枚也人之初生水火自平陰陽和均無有差等至於天癸之動不知愛惜始覺一多一少故有陽有餘陰不足之論而將一腎分為兩體也不知節欲保守殘陰反服補陰益陽之劑吾恐已傷之陰未能復而幸存之陽今又見傷也陰陽俱傷元氣漸損人能久存乎是以所取補腎之方以滋陰大補丸為主也人有誤服壯陽辛燥之劑鼓動真陽之火煎熬真陰之水以致相火妄動陰精漸涸者其法以滋水為主以制陽火蓋腎苦燥急急食辛以潤之滋水者滋其水之化源以御其辛燥之邪燥邪既退陰水自生水生不已則火有所制而不動矣以補陰丸主之黃柏鹽水拌新瓦上炒制褐色四兩知母去皮酒拌新瓦上炒四兩淮慶熟地黃酒洗焙十六兩天冬去心新瓦上焙一兩共為末煉蜜為梧子大每服五十丸空心食前鹽湯下腎惡燥用知母之辛以潤之腎欲堅用黃柏之苦以堅之虛則以熟地黃補之蓋虛則補其母肺乃腎母金體本燥今用辛燥之藥恐肺益燥故以天冬而補肺使之潤燥瀉火而滋腎之化源也昔中丞孫淮海公年四十無嗣嘗聞豫以廣嗣之道且語其故豫告曰易云男女媾精萬物化生夫男子陽道之堅強女子月事之時下應期交接妙合而凝未有不成孕者矣男子陽道不強者由於腎肝之氣不足也腎者作強之官肝者罷極之本肝之罷極生於腎之作強也故陰痿而不起不堅者筋氣未至也肝主筋肝虛則筋氣不足矣陰起而不堅不振者骨氣未至也腎主骨腎虛則骨氣不足矣又有交接之時其精易泄流而不射散而不聚冷而不熱者此神內亂心氣不足也凡有此者宜各隨其臟氣之不足而補之在肝則益其肝如當歸牛膝續斷巴戟之類在腎則益其腎如熟地黃蓯蓉杜仲之類在心則益其心如五味益智破故紙之類用枸杞菟絲柏子仁以生其精使不至於易乏山茱萸山藥芡實以固其精使不至於易泄修合而服其藥勿雜其接以時則兆罷熊之夢麒麟之子可計日而待矣命其方曰螽斯丸熟地二兩歸身酒洗牛膝酒洗川續斷酒洗巴戟去心蓯蓉酒洗焙杜仲薑汁炒盡絲枸杞菟絲子酒蒸柏子仁去殼山茱萸肉芡實肉山藥各一兩破故紙炒益智仁五味各五錢共為末煉蜜為丸梧子大每服五十丸空心溫酒下公問女子月事或前或後無定期者何以調之全曰此神思之病無以治之公曰何故全曰寵多而愛不周念深而幸不至是以神思亂也況女子者以身事人而其性多傲以色悅人而其心多忌故難調也公曰據此意制方平其氣養其血開其鬱宜無不可全曰謹如教乃進調經丸方用香附川芎陳皮以開鬱順氣白朮補脾當歸養心以治心脾之病香附米杵淨一斤以醋浸春五日夏三日秋七日冬十日瓦罐煮乾又焙乾取末川芎當歸白朮陳皮各五錢為末酒煮麵糊為丸梧子大每服五十丸空心食前米湯下人有陽道常痿者多致無子不可不慮也惟其求嗣之急易為庸醫之惑或以附子起石為內補或以蟾酥啞芙蓉為外助吾見陽事未興內熱已作玉莖雖舉頑木無用終身無子而夭歿者有之深念此輩無辜而受醫藥之害遍訪諸方無逾此者出以示人命之名曰壯陽丹熟地黃四兩巴戟去心二兩破故紙炒二兩仙靈脾二兩陽起石炒另研水飛一兩桑螵蛸真者焙一兩上為末煉蜜為丸如梧子大每服三十空心無灰酒下亦不可持此自恣也戒之按秋石五補丸亦同紫河車之意丹經云可惜可惜真可惜腰間有寶人不識將錢賣與粉髑髏卻到街頭問秋石可見秋石者亦以人補人也但煉者必以火雖有滋補之功不能無火性之毒方士乃設為水煉之法大陰煉法火升之法以誑人人喜其説耳為所誑而不悟謂水煉者譬如海濱煮鹽者用水耶用火耶可以類推矣雖有凝底汙濁之渣臭穢之氣其可服乎設以水澄之如鹽入水消化不復再聚矣其有凝聚者乃假他物在中如取靛者之用石灰靛化而灰存聞彼謂大陰煉者此日曬夜露之滷垢也如年久糞缸之上所結人中白者亦可代秋石乎彼謂水升者水曰潤下過顙在山豈水之性哉雖曰火酒燒成者乃上升之氣化而為液復下而成酒也惟朴硝與水銀見火則上升成粉也然則上升之秋石乃朴硝水銀之屬乎方士之誑人者巧如穿窬明哲之士未有不為所惑者也故謂其能除咸去臭臭誠可去矣潤下作咸咸者水之性也五味在物各有自然謂咸可去此無根之言而人乃信之何也吾煉秋石之法得於異人之傳可代鹽食又無火毒秋石鹹平水之精補骨脂苦溫炒火之精五味酸溫焙水之精小茴辛溫炒金之精巴戟甘溫去土心之精各等分為末山藥作糊為丸如梧子大每日空心服五十丸紅棗煎湯送下煉秋石法取童男八歲以上童女七歲以上至精血未動者之小水不拘多少各半用大缸一口作灶放陰陽二水在中文武火煮將干預置一鐵鏟安柄似鍬形不停手四邊鏟動又用桑白皮二三斤銼碎放在內以剷剷作一團和勻卻用武火燒令缸紅並桑白皮燒成灰為度去火待冷定然後剷起稱多少重再取小鍋一口只用磚架以便易取易放將鏟取秋石研篩過稱每秋石一斤河水斤半同入小鍋中用火再煮乾以小鐵鏟鏟動勿令黏鍋照前燒令鍋紅煉二次去火取起放鐵鍋中乘熱研細末安置瓷盆中又稱水一斤半放里以物蓋定勿令泄氣候冷別用一瓷盆放筲箕在上下鋪細布一層再又綿紙一層別用竹篦作一團圈以布漫定如取魚之篳亦鋪綿一層在內傾水入里放箕上隔一物濾過其滓棄去只用澄過清水又用磚作一字長爐約三四寸闊安炭火勿緊勿慢卻以白瓷盆置其上一字排定每盆中放水半杯少頃凝結如冰潔白可愛秋石成矣此為三煉無中生有渣滓之物臭穢之類盡絶矣或欲禱錠送人卻以錠模子取之按補髓丹乃葛可久先生治癆瘵後之調養方也此方滋補之功甚大無疾之人可以長服以免血枯氣少髓干精竭之病一名十珍丸十珍丸獖豬脊髓一條完者牯羊脊髓一條完者團魚九肋者一個烏雄雞白毛烏骨者一隻牧卷籠中以火麻子煨一七勿令蟲食四味淨制去骨存肉醇酒一大碗於砂鍋中煮熟擂爛再入大山藥五條蓮肉去心皮半斤京棗去皮節一百枚柿餅有霜者十枚四味修制用井花水一大瓶於沙鍋煮熟擂爛與前熟肉和一處再用慢火熬之卻下鹿角膠四兩真黃臘三兩上二味逐漸下與前八味和一處搗成膏子和平胃散末四君子末知母黃柏末各一兩共十一兩搜和成劑十分硬再入煉蜜放石臼中杵千餘下為丸如梧子大每服百丸不拘時棗湯下人之夢泄其候有三年少氣盛鰥曠矜持強制情欲不自知覺而泄精者如瓶注水滿而自溢也人或有之是為無病不須服藥如邪克於陰神不守舍心有所感不能主宰或心受熱陽氣不收而泄精者如瓶之側而水出也人多有之其病尤輕合用平和之劑至若臟腑積弱真元久虧心不攝念腎不攝精夜夢魂交而泄者如瓶之鏬而漏也人少有之此病最重非固澀之劑恬靜之心必不能治也或謂夢泄盛於房勞者蓋陰陽交接二氣相應真精雖泄真氣不走若在夢中則精氣俱泄矣又有一等人念慮邪淫神氣消靡遊魂為變邪氣乘虛往往與鬼魅交通是又厄運不可曉者法藥相助誠哉是言也治夢遺法除滿而自溢者其情有所感心有所慕宜服前滋陰大補丸並固精丸更宜清心寡欲一妄不生可也否則久亦成虛滑矣若因酒色縱欲下元虛損者必用妙應丸祕精固澀之藥以救其脫用前藥河車丸滋補之藥以滋其陰清靜以安其神戒懼以防其敗或有能濟者矣否則虛損無補其何能淑更有睡法夜只側臥或左或右伸下足屈其上足以挽下足之膝腕中上手掩臍下手握固枕其首手攀起其莖勿令挨肉則通宵不泄矣固精丸治心神不安腎虛自泄精知母炒黃柏酒炒各一兩牡蠣左顧者煅白龍骨火煅芡實去殼蓮蕊無薏苡仁代白茯苓去筋膜遠志去心山茱萸肉各三錢山藥研作糊二兩硃砂水飛過三分為衣上山茱萸以上九味研為細末水煮山藥糊丸如梧桐子大硃砂為衣每服五十丸棗湯送下妙應丸治遺精白濁乃固澀去脫之法也真龍骨硃砂水飛石菖蒲各二錢半白茯苓苡仁石蓮肉砂仁各一錢半桑螵蛸焙菟絲子酒浸一宿焙各五錢牡蠣用破草鞋包火酒煅研一錢上為細末山藥糊九梧桐子大每服五十丸粳米飲下金鎖祕精丹治男子嗜欲過度精氣不固固澀去脫之劑蓮肉去心芡實肉各四兩白龍骨煅一兩桑螵蛸焙一兩共為細末又以金櫻子霜後半黃者去刺劈兩片去子水淘淨搗爛入鍋中水煎不住火約水耗半以布濾去渣再煎如稀飴和藥末杵千餘下為丸梧桐子大每服三十空心鹽湯送下更以獖豬腰子二枚煨熟壓之助其藥力人之生也水為命火為性土為形故水火非土則無所載性命非形則無所附形者性命之舍猶果之仁有殼也何謂土戊己是也何謂形脾胃是也胃為戊土以司受納脾為已土以司傳化胃陽主氣脾陰主血榮衛乎一身者也故脾胃實則糟粕變化津液流通神安而性靜氣盛而命立則無病矣脾胃若傷則水穀入少榮衛氣衰形敝而性命無所依附矣此東垣脾胃論誠發千古不傳之祕也人讀東垣書用補中益氣湯只説內傷是不足之病不知其有餘之為內傷也蓋不足者脾胃之正氣不足也有餘者水穀之邪氣有餘也故諸補中益氣方者皆治其不足之病諸導滯消積方者皆治其有餘之病也人有平日食少者必無傷食之病間或有之只從不足一邊論補中益氣內少加麴櫱以消導之可也不可妄攻致成虛損人之善食者脾胃素強自恃其強而倍之即成傷矣雖大吐大下未為不可人之傷食者未可便吐下之恐傷胃氣如傷之輕者損谷自愈不必服藥若覺胸腹痞脹當時自以指探而吐之可也或服前加減二陳湯一二劑或取保和丸服之階快為度不可遽下惟覺腹中滿痛煩躁不安不可下當問其所傷之物以前取積丸攻而去之不可隱忍便成損聚保和丸消宿食無留滯之積助脾胃成變化之功尤宜小兒橘紅一兩枳實麩炒黃連薑汁炒各五錢白朮一兩半木香三錢山楂肉神麯炒各七錢麥芽炒萊蔔子炒各五錢為細末湯浸蒸餅為丸白湯下脾胃素強能食之人宜常服枳朮平胃丸以免傷食之病枳朮平胃丸白朮蒼朮米泔浸陳皮各四兩厚朴薑汁炒枳實麩炒香附童便浸各二兩砂仁炙甘草各一兩為細末荷葉包粳米煮飯為丸梧子大每服五十米飲下脾胃素弱食少之人宜常服健脾散以助中和氣治脾泄尤妙健脾散人參一兩白朮白茯苓炙甘草各二兩山藥蓮肉去心薏苡仁芡實去殼白扁豆去殼炒各四兩上為細末每服二錢棗湯調服人有善飲者當服神仙醒酒方解酒毒醒宿酒飲酒不醉葛花五兩赤小豆花三兩家葛根澄粉八兩白豆蔻去殼取末七錢上為細末用生藕搗汁和丸如彈子大每服一丸嚼爛津咽下凡丈夫無子者有二病焉一曰稟賦不足二曰色欲太過所以陽道痿弱精氣衰冷故無子者天命之限亦人事之盡方無悔也宜服巴戟丸巴戟酒浸去心益智仁杜仲鹽酒炒盡絲菟絲子酒浸蒸杵川續斷白茯苓山藥遠志去心甘草水炙蛇床子炒牛膝去蘆酒浸各一兩山茱萸去核五味子各二錢肉蓯蓉酒浸二兩為末煉蜜為丸梧桐子大每服二三十丸空心溫酒下凡婦人無子者有三病一曰血海虛冷二曰神思困郁三曰飲食減少所以經候不調朝夕多病故無子也宜服烏雞丸白毛烏骨雞一隻重二斤半許關在籠中以陳老米飯餵養一七勿令食蟲閉死去毛腸淨用丹參四兩銼細放雞肚裡以瓦罐一個裝雞在內再入醇酒浸煮約高一二寸許慢火煮熟取出和骨搗爛捏作薄餅蘸余汁焙至干研為末香附米淨一斤分四主一主米泔水浸一主童便浸一主醋浸一主酒浸春秋二日夏一日冬四日搗碎焙乾熟地黃四兩當歸酒洗白芍藥鱉甲九助醋炙各三兩川芎三兩半人參三兩牛膝去蘆酒洗白朮知母各二兩丹皮貝母柴胡各二兩地骨皮乾薑炒玄胡黃柏炒各一兩秦艽一兩半白茯苓黃耆炙各二兩生地黃酒洗三兩為末並雞末和勻酒浸各半煮麵糊丸如梧子大每服五十丸溫酒米飲任下忌煎炒辛辣之物及莧菜男女之無子者非情不洽則神不交也何謂情不洽或男情已動而女情未洽則玉體方交瓊漿先吐陽精先至而陰不上從乎陽謂之孤陽或女情動而男情未洽則桃浪雖翻玉露未滴陰血雖至而陽不下從乎陰謂之孤陰兩者不和若春無秋若冬無夏故不成胎也若此者服藥何益腰者腎之府人身之大關節也行則傴僂腎將憊矣故腰痛之病多屬腎虛曰風曰濕因虛感之人年四十以後腎氣始衰宜常服煨腎散青娥丸二方庶兔腰痛之疾或以腰卒痛者煨腎散服之立止杜仲蓯蓉巴戟天茴香故紙及青鹽豬羊腰子燒來服八十公公似少年杜仲鹽水炒去絲肉蓯蓉酒洗巴戟去心小茴炒破故紙酒淘淨炒青鹽各等分上為末和勻用獖豬腰子竹刀劈開內劃成縱橫路人藥一錢濕紙包裹火中煨熟食之溫酒咽下每日食一枚牯羊腰子亦可青娥丸昔趙進士從黃州太守得此方久服大有神效遂作詩以記其功云十年辛苦走邊隅造化工夫信不虛奪得風光歸掌內傾城不笑白髭鬚破故紙水淘淨待乾用黑芝麻同炒去麻十兩杜仲去皮銼細以主薑自然汁炒盡絲取末五錢二味各等分為細末用胡桃肉五十個以糯米粥相拌臼內搗如泥布濾去滓只用此糊為丸梧子大每服三十丸空心鹽湯下人年四十腎始衰陰氣自半腎之榮發也故發始斑者宜服何首烏丸填精補髓發永不白何首烏新取赤白二種各半用米泔水浸一夜竹刀刮淨忌鐵牛膝去蘆半斤黑豆酒浸三升用柳木甑一個作平底篳放高些勿近水鋪黑豆一升在底即鋪何首烏片六兩一層又鋪牛膝二兩七錢作一層又如前鋪黑豆首烏牛膝以物蓋定慢火熬至豆爛為度取出去豆以竹刀銼碎暴乾用石碾石臼取末勿犯銅鐵何首烏末一斤牛膝末半斤熟地黃酒蒸忌鐵焙乾取末半斤三味和勻煉蜜放木臼內杵千餘下為丸梧子大每服五十丸用先蒸過黑豆曬乾為末收貯每用七粒煎酒吞藥忌羊血蘿蔔生蔥並藕人年五十肝葉焦膽汁減目始不明夫目者精明之府肝之竅也水者木之母也腎為水臟其液藏於肝膽上注於目自四十腎衰精少液干故五十肝葉焦膽汁減者皆腎氣不足所致也虛則補其母宜用育神夜光丸熟地黃酒洗蒸焙生地黃酒洗焙取末各二兩當歸酒洗牛膝去蘆酒洗遠志去心甘草水煮地骨皮淨枸杞酒洗甘菊花五味子各一兩菟絲子酒洗淘去灰土再以酒浸一夜蒸搗為餅曬乾枳殼麩炒為末煉蜜為丸梧子大每服五十丸空心鹽湯下食後酒下臨睡茶湯下夫齒者骨之餘腎之標也故腎氣盛則髮長齒堅腎衰則齒去發落古人用搽牙散如西嶽華山方可用切不可以苦參揩牙昔有人用之病腰痛者以腎受傷也吾有一方白牙固齒去風除齲屢用甚效熟地黃二兩香附二兩嫩槐枝四十九寸長新缸瓦炒成炭存性取起擇去梗石膏煅一兩旱蓮草二兩升麻炒一兩細辛五錢白芷五錢羊脛骨燒灰五錢青皮炒五錢為末用黑鉛作盒盛之人年六十常苦大便艱澀祕結此氣不調血不潤也蓋腎開竅於二陰腎虛則津液不足津液不足則大便乾澀不通切不可用攻下之劑愈攻愈祕轉下轉虛雖取一時之快適貽終身之害古人用蘇麻粥以養老丹溪以三子養親湯事其母皆美法也吾制地黃四仁丸治老人便祕之病地黃四仁丸火麻仁淨肉另研二兩郁李仁去殼另研一兩桃仁去皮尖四十九粒杏仁制數同熟地黃酒洗蒸焙另研二兩上五味各研極爛不篩放舌上無渣方好煉蜜為丸梧子大每服五十丸棗湯送下此方以地黃補腎生津液麻仁桃仁治血祕又潤血中之燥郁李仁杏仁治氣祕潤氣中之燥和之以蜜亦以潤燥也蘇麻粥真蘇子炒五錢火麻仁炒一兩研爛以熟絹袋盛之用水二盞於絹袋子中煮之三沸取出挂當風處令乾下次再煮每藥一袋可煮三次卻以本水入粳米煮糜粥食自然大便潤快以麻仁潤血蘇子行氣也三子養親湯蘇子炒蘿蔔子炒白芥子炒各研為末三處收臨時以一味為君二味為臣君者五兩臣者二兩半每藥一錢滾白水點服如氣盛以蘇子為君痰盛以芥子為君食積以蘿蔔子為君人中年以後多脾泄之病前健脾散乃聖藥也切不可用劫澀之劑按永壽丸方者大梁郭之卿為尚書時常服之年逾八十精力倍加此方大補元陽益脾胃調順氣血添補精髓人年四十以後宜常服之蓮肉去心先用酒浸一日後裝入雄豬肚內縫緊卻將浸蓮肉酒添水煮熟取出曬乾肚子不用一斤蒼朮刮淨分作四分用酒鹽水米泔水醋分浸按時定日一斤白茯苓四兩熟地黃四兩川楝肉炮取肉枸杞山藥柏子仁炒另研破故紙用麻油用炒香去麻各二兩青鹽炒五錢沉香木香各一兩五味子小茴香炒各二兩十四味為末酒和杵勻為丸如梧子大每服五十丸加至七十丸空心溫酒下鹽湯送下此方比草靈丹尤勝人之病者有十病九痰之説然則痰之為物也乃腎之真水五臟之真精腸胃之精液人之有痰猶魚之有涎木之有液苟無是痰則死矣惟人氣失其平則氣逆氣逆則津液不行不行則榮衛不通不通則水穀之氣不能傳化並其糟粕之滓凝聚而成痰矣痰者水穀之養所變也古人治痰以通氣為主意可見矣肥人之痰從濕瘦人之痰從火不可不知肥人痰者奉養太厚軀脂塞壅故營衛之行少緩水穀之化不齊所以多痰故治肥人者補脾益氣為主宜用益氣化痰丸南星去皮臍二兩半夏湯泡七次二兩為細末用薑汁捏作餅勿太軟用楮葉包裹如盦醬樣待生黃衣取出曬乾此須在三伏天作之半夏曲亦如此作加入人參五錢白朮白茯苓陳皮各一兩半蒼朮米泔浸香附童便浸枳實麩炒各一兩蘇子炒另研白芥子炒另研炙甘草各五錢神麯炒一兩桔梗炒一兩為末用薑汁浸蒸餅為丸梧子大每服五十丸白湯送下瘦人之痰房勞太過暴怒無常衝任之火妄動水穀之氣不化所以生痰治瘦人者以補腎降火為主宜用滋陰降火丸熟地黃薑汁拌焙天冬去心白茯苓知母黃柏炒火色各十兩貝母陳皮去白鹽水炒蘇子炒另研瓜蔞霜各五錢為末煉蜜為丸梧子大每服五十丸空心淡薑湯下人之病癆者動曰火症此虛損之病要分五臟治之不可誤也病者憎寒壯熱自汗面白目干口苦精神不守恐畏不能獨臥其病在肝宜服柴胡四物湯金匱腎氣丸治之柴胡四物湯即小柴胡四物湯二方合也人參五分黃芩一錢半夏炮三分柴胡一錢炙甘草五分當歸身七分川芎五分白芍五分生地黃酒洗一錢生薑三片水煎金匱腎氣丸金匱腎氣丸即六味地黃丸乃補肝之母也山藥四兩山茱萸肉四兩澤瀉丹皮去末白茯苓各三兩熟地黃八兩為末煉蜜丸每服五十丸空心酒下病者寒熱面黑鼻爛忽忽喜怒大便苦難或腹清瀉口瘡其病在心宜服加減八珍湯天王補心丹八珍湯人參白茯苓炙甘草歸身生地黃白芍麥冬各五分五味九粒酸棗仁炒三分澤瀉三分黃連三分水一盞半燈芯十二根水煎八分食後服天王補心丹方見前病者憎寒熱面青唇黃舌本強不能言飲食無味體重肌痛口吐涎沫其病在脾宜服補中益氣湯參苓白朮丸補中益氣湯升麻五分黃耆炙炙甘草各五分人參一錢白朮五分供身五分柴胡五分陳皮五分水盞半煎八分食遠服脾胃益虛肺氣先絶用黃耆以益皮毛而開腠理不冷自汗上喘氣短損其元氣用人參補之心火乘脾用炙甘草以瀉火熱而補胃之元氣若脾胃急痛腹中急縮者宜多用之此三味乃除濕熱煩熱之聖藥也白朮甘溫而苦除胃熱利腰間血升麻苦平味薄能升胃中清氣又引黃耆甘草甘溫之氣上升能補衛氣之散解而實其表用當歸以和血脈用陳皮以理胃氣又助陽氣上升以散滯氣而助甘辛之藥力如咽乾加乾葛心刺痛倍加當歸精神短少倍加人參外加五味子頭痛加蔓荊子痛甚加川芎咳嗽夏加五味麥冬秋加連節麻黃春加佛耳草款冬花久嗽者去人參食不下者或胸中有寒或氣滯加青皮木香陳皮寒月加益智仁草豆蔻夏月加芩連秋加檳榔砂仁心下痞加芍藥黃連腹脹加枳實木香砂仁厚朴天寒加生薑肉桂夏加黃芩乾葛白芍冬加益智仁草豆寇半夏脅痛或縮急加柴胡甘草膝下痛加熟地黃不已是寒加肉桂大便祕結加當歸外加大黃腳弱或痛加黃柏不已加防風氣浮心亂以硃砂安神丸鎮之上此方加減之法乃飲食勞倦喜怒不節之證若證屬熱中者宜用此方若證屬寒中者則此方中黃耆人參甘草白芍五味能益其病不宜用此方參苓白朮丸方見前病者憎寒發熱面鼻乾口燥毛折咳嗽喘急時吐白沫或有紅血線其病在肺宜服加味紫菀散大阿膠丸加味紫菀散即海藏治虛勞咳中有血方加天冬麥冬人參三分紫菀二分知母七分貝母五分桔梗三分甘草三分五味九分白茯苓五分阿膠炒成珠五分天冬去心麥冬去心各八分水一盞煎八分臨睡服大阿膠丸凡嗽血俱用真阿膠蛤粉炒成珠生地黃天冬去心白茯苓五味子肥者山藥各一兩貝母知母款冬花桔梗桑白皮蜜制杏仁炒去皮人參甘草各二錢半為末煉蜜為丸彈子大每服一丸薄荷湯下病者憎寒面黃耳聾焦枯䯒痠痛小便白濁淋漓其病在腎宜服加味四物湯此補腎虛之要藥也熟地黃二錢二分川芎五分歸身八分白芍一錢知母八分黃柏炒褐色八分天冬去心一錢五味十二粒柏子仁五分水二盞煎一盞空心服下又宜服紫河車丸方見前此上三條乃治虛勞之法也人有常病實熱者熱久不退元氣受傷所謂壯火食氣也宜生熟三補丸主之此方瀉壯火以去元氣之賊除客熱以滋腎水之源水升火降成既濟之功天清地寧致交會之用豈小補云乎哉黃芩黃連黃柏用半生半熟甘草半生半炙各一兩為末煉蜜為丸梧子大每服五十丸淡薑湯下人有脾虛生瘡者宜枳殼化痰丸主之白朮二兩枳實麩炒二兩陳皮去白留紅七錢半半夏曲一兩香附童便浸一兩半神麯炒一兩蒼朮米泔浸一兩半為末荷葉包米煮飯為丸梧子大每服五十丸淡薑湯下此方健脾胃成傳化之功進飲食無留滯之積開鬱而氣自順化痰而飲不蓄藥品雖微其功最大內經曰大毒治病十去其三小毒治病十去其五無毒治病十去其七製為定數者恐傷正氣也又曰穀肉菜果以食養盡之者謂以穀肉菜果去其未盡之邪也可見穀肉菜果皆藥也凡肝病者宜食酸麻子犬肉韭皆酸所謂以酸瀉之也心病者宜食苦小麥羊肉杏薤皆苦所謂以苦瀉之也脾病者宜食甘粳米牛肉棗葵皆甘所謂以甘瀉之也肺病者宜食辛黃黍雞肉桃蔥皆辛所謂以辛瀉之也腎病者宜食鹹大豆豬肉粟藿皆咸所謂以咸瀉之也今人無事多喜服酒藥者謂其去風濕也蓋人身之中陽主動陰主靜陽常有餘陰常不足酒者辛燥之物助陽耗陰者也加之辛燥之藥不已甚乎辛則發散燥則悍熱春夏飲之則犯遠溫遠熱之禁秋冬飲之則失養收養藏之道果有風濕之疾飲之可也無風無濕飲此辛散燥熱之劑則腠理開血氣亂陽不能固陰不能密風濕之氣因而乘之所謂啓關納寇也吾平生不妄與人以古方必有是病可用酒助其藥力者則與以對症之藥而烏附草藥不敢用也若夫常飲之酒則有仙家可以調氣可以怡神豈特卻疾而已哉地黃酒法每糯米一斗用生地黃三斤同蒸以白麵拌之候熟任意用之蓋地黃味甘苦寒無毒大補五臟內傷不足通血脈填骨髓益氣力利耳目古詩云床頭一甕地黃酒薯蕷酒用山藥生者佳如無生者取乾山藥蒸熟去皮一斤酥油三兩無以牛膝代之同研丸如雞子大每服一粒用酒半斤燙熱以丸入酒中化開飲之蓋山藥味甘性溫無毒補虛病充五臟強陰久服耳目聰明輕身不飢書云薯蕷涼而能補大有益於補養何首烏酒新取用竹刀刮淨薄切米泔浸一夜取出曬乾木石臼杵為末磁器盛之每日空心稱一錢酒調服蓋何首烏味甘溫長筋骨益精髓壯氣力黑鬚發久服令人有力遇偶日服之為良忌羊血贊曰神物著助道在仙書雌雄相交晝夜合之服之去殼日居月諸返老還少保安病軀天門冬酒新取天門冬一二十斤去皮心陰乾搗羅為末每服三錢酒調下蓋天門冬味苦甘寒強骨髓養肌膚鎮心補腎潤五臟益氣力殺三蟲去伏尸久服延年令人多子此藥在東嶽名淫羊藿在中嶽名天門冬在西嶽名藿香藿松在北嶽名無不愈在南嶽名百部在京洛山阜名顛棘處處有之其名雖異其實一也忌鯉魚春壽酒方常服益陰精而能延壽強陽道而得多男黑鬚發而不老安神志以常清蓋取此為春酒以介眉壽之義而立名也天門冬去心麥門冬去心熟地生地山藥蓮肉去心紅棗去皮核各等分每一兩煮酒五碗旋煮旋飲其渣於石臼中杵極爛為丸梧子大每服五十丸酒下此方大有補益治諸風痰紫背浮萍酒方歌曰天生靈草無根干不在山兮不在岸始因柳絮逐東風點點飄來浮水面神仙一味去沉疴要採之時七月半管其癱風與瘓風些小微風都不算豆淋酒內服一丸鐵幞頭上也出汗其萍以紫背為上採回攤於竹篩中下著水盆曝之乃干研末煉蜜為丸如彈子大每服一丸用黑豆煮酒化下治左癱右瘓三十六種風偏正頭風手足不舉口眼喎斜癜風癩風服過百粒即為全人比天助陽補精膏歌曰靈龜衰弱最難痊好把玄經仔細看補髓填精身體健殘軀栽接返童顏此方添精補髓善助元陽潤皮膚壯筋骨理腰痛下元虛冷五癆七傷半身不遂腳膝痠弱男子陽事不舉陰精易泄貼之可以興陽固精行步康健氣力如添治女子下元虛冷經水不調崩中帶下無子者貼之可以暖子宮和血氣其功不可盡述惟在至誠修煉藥力全備火候溫養以二七為期其功成矣真麻油一斤四兩用淨鍋一口以磚架定三足安置白炭三十斤慢火煎不可太急恐損其藥槐柳桃榴椿杏楊各二枝第一下甘草去皮二兩煎至不鳴第二下天冬去心生地黃酒洗熟地黃酒洗遠志去心麥門冬去心肉蓯蓉酒洗焙乾蛇床子制牛膝去蘆酒洗鹿茸酥制續斷虎脛骨酥炙木鱉去殼紫梢花去草穀精草大附子去皮杏仁去皮尖肉桂菟絲子酒淘淨搗爛焙乾肉蔻麵包煨川楝子去核上二十味各錢半銼碎煎製成炭取起以布濾去渣要淨再上磚架定取嫩桑條如拇指大約長一尺六寸者一根攪油第三下黃丹水飛炒乾半斤黃臘鮮明者五兩燒油令滾以茶匙抄丹細細入油桑枝不住手攪滴水成珠不散為度又取起攤候溫又上架第四下雄黃透明者白龍骨倭硫黃赤石脂各一錢研細末勿令油大沸只大溫微火煎不住手攪又攤起候溫上架第五下乳香沒藥丁香沉香木香各一錢為細末入膏內不住手攪微火溫養第六下麝香當門子蟾酥乳汁制陽起石煅蛤芙蓉各一錢為細末入膏內不住手攪微火養煉務要軟硬得宜貼不移動揭之無迹為度取起收磁罐中密封口埋土中三日夜去火毒每用膏五錢攤在厚紅素緞絹上貼臍下關元穴及背後腎俞二穴每一個可貼六十日方換其效如神但不可恃此固縱以傷真元氣也
