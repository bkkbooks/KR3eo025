front:
  text: 序書之義屏嗜好適寒暄順翕張調滋滲該少長等賢愚得要者昌反之舛也予以為少年丈夫子宜置一通座隅夫識者情之導盛者欲之潢識不確則逸伺盛不輯則殞隨卻顧者卻步考祥者考終卮漏而補鮮不決矣始予總角修博事業會見曾大母大父大母几杖弗戒星星充廬迨孝廉時先大夫王母鶴髮承萊彩化日融融春風渙燠何其恬耶則豈非葆真孕素不鑿不搖之所召乎居有間再從阿宜稱為玄朗者一大兒穿貫經墳初試即馳譽國中再試食會饌三試戰棘圍擬高等暫輟次亦不失計然才然皆弱冠駢駢以衷損逝青陽不暇蘭芽蚤折悲夫維其時使蚤通降性之訣復有長慮引而掖之以不鑿不搖第無論青紫無論什一聲音笑貌至今存可也予為此懼行梓是書遺之家塾蓋書云要要養也予去要要少也始之愉愉其終也戚識其戚而豫焉雖不老聃氏之如尚可籛坚也如也老聃天定籛坚人定
