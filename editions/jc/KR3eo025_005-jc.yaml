body:
  text: 卷之五養生總論養生之道只要不思聲色不思勝負不思得失不思榮辱心無煩惱形無勞倦而兼之以導引助之以服餌未有不長生者也服餌之物穀肉菜果為上草木次之金石為下蓋金石功速而易生疾不可輕餌恐毒發難制也近觀服杏仁者至二三年或泄或臍中出皆不可治服楮實者輒成骨痿服鍾乳陽起石硫黃丹砂雄黃附子烏頭之屬多為虛陽發熱作疾服女子初經作紅鉛者亦然悉宜屏之勿輕信也方士惑人自古有之如秦始皇遣人入海求不死之藥漢武帝刻意求仙至以愛女妻之此可謂顛倒之極末年乃悔悟曰天下豈有仙人惟節食服藥差可少病而已此論甚確劉潛夫詩云但聞方士騰空去不見童男入海回無藥能令炎帝在有人曾笑老聃來南史範云初為陳武帝屬官武帝九錫之命在旦夕忽感寒疾恐不獲愈預慶事召徐文伯診視以實懇之曰可得便愈乎文伯曰若便差甚易恐二年不復起耳云曰朝聞道夕死可矣況二年乎文怕以火燒地布桃葉置云其上頃刻汗解裹以溫松易日疾瘳云喜甚文伯曰不足喜也越二年果卒觀此可為求速效者之戒病有堅痞風氣結在皮膚肉腠者可用針分寸如法在胸腹腰脊近臟腑腸胃者非是上醫勿便用針按素難凡治臟腑之病取手足井榮俞經合以行補瀉之法故八法針天星十二穴者上取下取左取右取合擔則擔合截則截吾有秘傳皆不離手足了盡一身之疾凡有疾者頭項胸腹腰脊肋脅戒勿用針凡頭面胸腹脊膂諸穴有宜灸者不過三壯不可多灸有人灸丹田穴動則五六十壯謂之隨年壯人問其故答曰若要身體安丹田三里常不幹噫此齊東野人語也人能謹其嗜欲節其飲食避風寒雖不灸丹田三里身自無病而常安也否則正氣一虛邪氣自攻以灸補虛是以油發火也無益而反害之凡用針灸後常宜慎欲至疾愈方可不然則無效矣延年益壽不老丹生地黃酒浸一夜曬乾三兩熟地黃洗淨曬乾三兩地骨皮酒洗淨曬乾五兩人參三兩天冬酒浸三時去心曬乾三兩麥冬制同三兩白茯苓去粗皮切片酒浸曬乾五兩何首烏鮮者用竹刀刮去皮切片酒浸曬乾乾者用泔水浸軟刮去皮切片用砂鍋內先下烏羊肉一斤黑豆三合量著水於上加竹蓖放此藥覆蓋蒸一二時辰取出曬乾半斤共為細末煉蜜為丸梧桐子大每服三五十丸酒送下清晨服之此藥千益百補或十日或一月自知為另等人也常服功效難言得此藥者不可以為藥易而輕傳也此方崇德縣知縣所送服之果覺有效鹿角霜丸黃柏去粗皮人乳拌勻曬乾如此三次炒褐色用之或六兩或四兩隨時加減八兩鹿角霜八兩天門冬去皮心二兩麥門冬去心二兩人參一兩或二兩生地黃置水中去浮者酒浸一夜二兩熟地黃酒浸一夜曬乾二兩為末煉蜜為丸梧子大每服七十丸加至百丸淡鹽湯送下或酒尤佳煮鹿角霜法鹿角用本年解及新鋸血氣不幹枯者截寸半置長流水中浸七晝夜滌去腥穢每角一斤加桑白皮二兩黃蠍二兩楮實子一兩放銀器內或鹽泥固濟的好壇炭灰煮七晝夜水耗以熟水添之旋耗旋添角軟如熟樣取出曬乾聽用將煮角汁去藥渣並蠍皮火熬膏收貯每用三錢酒化融服其功更勝若是麋角尤佳煮制之法相同何首烏丸八月採赤白各半極大者佳以竹刀刮去皮切碎用米泔水浸一夜漉出曬乾以壯婦生男乳汁拌曬三度候乾用木臼舂為末羅細以北紅棗蜜雲縣出者佳於砂鍋內煮去皮核取肉和藥末千杵為丸焙燥以磁器盛之初服二十丸每十日加十丸至百丸止空心鹽湯下忌鐵與諸血蘿蔔此長生真人保命服食治五勞七傷虛損無力四肢困倦腳手頑麻氣血耗散面黃肌瘦陽事不升虛暈噁心飲食減少此藥能治諸虛添精補髓滋潤皮膚充神壯氣身體輕健光澤開胃進食返老還童發白再黑齒落更生大有神效茯苓四兩天冬四兩山藥四兩熟地黃四兩枸杞四兩何首烏四兩乾薑二兩大茴炒一兩炒青鹽少許鹿角霜四兩蓮肉去皮半斤破故紙淨香油炒四兩沒石子一兩大核桃肉半斤麥冬四兩為末空心白湯調勻二三匙日進二服不拘在家在外少者一服老者二服功不盡述松梅丸肥腸健髓之驗松脂煉熱者一斤懷慶熟地黃酒蒸十兩烏梅肉六兩如後法制煉蜜為丸梧子大每服五十丸空心米飲鹽湯下此方得之南京吏部尚書大人者自云西域異人所授後服之果能加飲食致身肥健小便清大便潤精神不倦愚考諸本草云松脂味苦甘溫無毒安五臟除胃中伏火咽乾消渴久服輕身不老聰耳明目固齒潤肺辟邪氣去歷節風癘風痠痛不可忍仙家多煉服日無倦怠老年發白返黑若同茯苓末煉蜜服可以辟穀煉法用明淨松脂十餘斤先以長流水入砂鍋內桑柴火煮拔三次再淋桑灰汁仍煮七八次扯拔又用好酒煮二次完則以長流水煮過一次扯拔色白味不苦澀為度陰乾入石臼內杵搗取淨末依方配合再搗一日九次須要日乾乃佳又查熟地黃味甘苦無毒填骨髓五臟不足及男女勞傷通血脈益氣力利耳目一名曰地髓久服輕身不老黑髮增壽服此藥忌三白禁銀鐵器取沉水者佳曬乾稱用以清油洗淨木甑沙鍋蒸半日入臼舂用烏梅肉味酸平無毒能下氣除熱安心神療肢體痛生津液及好睡口乾利筋脈去痹消痰治骨蒸虛勞羸瘦解煩毒久服令人思睡不睡故東垣有言凡酸味最補元氣謂其有收之義耳取潤大者三五斤以溫酒浴洗甑內蒸熟去核取肉搗和前二味成丸鹿角霜丸鹿角鋸成寸段長流水浸七日入砂鍋內用桑柴火煮七日夜取出外去粗皮內去血穰研細末淨一斤知母去皮鹽酒炒黃色為末淨半斤生地黃酒浸一夜曬乾為末淨四兩熟地黃酒浸一夜曬乾為末淨四兩天冬酒浸去心曬乾為末淨四兩麥冬酒浸去心曬乾為末四兩當歸全用酒洗為末二兩何首烏去皮用人乳拌勻九蒸九曬為末不犯鐵器二兩白茯苓去皮為末用水淘淨去筋膜二兩麋角製法同前淨末一斤黃柏去皮切為咀片酒炒老黃色為末淨半斤共為一處拌勻煉蜜為丸梧子大每服五十丸空心溫酒送下或鹽湯送下亦好烏髮固本丸何首烏米泔水浸三宿竹刀刮去皮切片方加黑豆五升同首烏滾水泡一時蒸熟去豆半斤生地黃酒浸二兩黃精用黑豆二升同煮熟去豆忌鐵器四兩熟地黃酒浸二兩天冬去心二兩麥冬去心二兩白茯苓二兩赤茯苓去皮二兩片術二兩人參二兩五加皮二兩巨勝子二兩柏子仁二兩松子仁二兩核桃仁二兩枸杞二兩為細末煉蜜為丸梧子大每眼七八十丸空心溫酒鹽湯下卻老烏須健陽丹何首烏米泔水浸三夜竹刀刮去皮打碎如棋子大赤白各一斤牛膝同前何首烏用黑豆五升入砂鍋煎三次為末半斤枸杞酒浸洗曬乾為末半斤當歸酒浸一夜加茯半斤半斤故紙炒黃為末五兩茯苓赤者一斤牛乳浸白者一斤人乳浸俱一夜曬乾菟絲子酒浸三日曬乾為末半斤上七味各不犯鐵器煉蜜為丸如彈子大日進三丸早一丸空心酒下午後一丸薑湯下臨困一丸鹽湯下初服三日小便雜色是去五臟雜病二十七日唇紅口生津液再不夜起四十七日身軀輕健兩乳紅潤至一月後鼻頭辛酸是諸風百病皆出四十九日目視光明兩手火熱精通白髮返黑齒落更生陽事強健丹田如火行步如飛氣力倍加非人不可輕泄乃神秘之方也益母草丸益母草單一味為末不犯鐵器煉蜜為丸如彈子大每服一丸久服亦令人有子此先祖蘭窗公常用有驗者其婦人胎前產後諸疾治之皆效加減湯引於下本方加木香當歸赤芍尤佳無子者溫酒下服一月其經自調一方如上加外又有川芎腹有癥瘕加三稜莪朮胎前產後臍腹刺痛胎動不安下血不止用水煎秦艽湯下或當歸湯下半夏湯亦可胎前產後臍腹作痛有聲寒熱往來俱用米湯下臨產及產後先用一丸及童便酒下血氣自然調和又能破血痛調經絡極效產後胎衣不下及一切產難橫生或死胎經日不下脹滿心悶心痛炒鹽湯下產後中風牙關緊閉半身不遂失音不語童便無灰酒送下產後氣喘咳嗽胃膈不利噁心嘔吐酸水面目浮腫兩脅腋痛動舉無力溫酒下產後兩太陽痛太陽者前後腦也呵欠心悸怔忡氣短肌瘦不思飲食血風身熱手足頑麻百節疼痛米飲送下產後眼花黑暗血暈血熱口渴煩悶見鬼狂言不省人事薄荷湯下血崩漏糯米湯下產後赤白帶煎阿膠湯下產後大小便不通煩躁口苦薄荷湯下產後面赤顏垢五心煩熱或腹中血塊腹臍奔痛時發寒熱有冷汗者童便酒各半下或溫薄荷湯下產後惡血未盡結帶臍腹刺痛惡氣上衝心胸滿悶童便溫酒各半下產後痢疾米湯下又方三分散用小柴胡四物四君子㕮咀產後傷寒並痢者依方取效似神扶產後血瀉水煎棗湯下產後未滿月血氣不通咳嗽四肢無力自汗睡汗不止月水不調久而不治則為骨蒸潮熱用童便酒下若急用時取生者根莖花葉搗爛調服及絞汁入水飲亦可又治喉閉得吐即愈冬來用根為最妊婦五忌崑山顧狀元刊施二法一勿睡熱炕南方火櫃亦同一勿食煎炒炙煿之物一勿食蔥蒜韭薤葫椒茱萸一勿於星月下仰臥及當風洗浴坐臥一勿飲燒酒及黃酒蓋此二酒有藥恐後妊娠所禁相反小兒五宜一小兒初生先濃煎黃連甘草湯用軟絹或絲綿包指蘸藥摳出口中惡血氣或不及即以藥湯灌之待吐出惡沫方與乳吃令其出痘稀少一初生三五月宜繃縛令臥勿豎頭抱免致驚癇一凡乳食不宜一時混吃令兒生疳癖痞積一宜用七八十歲老人舊裙褲改小衣衫令兒有壽雖富貴之家切不可新制紵綾絞羅氈絨之類與小兒服不惟生病抑且折福愚意凡小兒滿月受賀宴賓宰殺生物亦非所宜一小兒四五個月只與乳吃六個月以後方與稀粥哺之周歲以前切不可葷腥並生冷之物令兒多疾若得二三歲後臟腑稍壯才與葷腥最好延年第一方鎮江錢醫官傳小兒初生臍帶脫落後取置新瓦上用炭火四周燒至煙將盡放於土地上用瓦盞之類蓋之存性研為細末預將透明硃砂為極細末水飛過臍帶若有五分重乳汁一二貝殼調和或以黃連甘草汁調亦好調和前臍帶末硃砂末二味如沙糖樣抹兒口中及乳頭一日之內抹盡次日兒大便遺下穢汙濁垢終身永無瘡疥及諸胎疾個個保全此十分妙法也臍帶內看有蟲當去之神效消毒保命丹凡小兒未出痘瘡者每遇交春分秋分時服一丸其痘毒能漸消化若服一二次者亦得減少若服三年六次其毒盡消必保無虞此方神秘本不宜輕傳但慈幼之心自不能已願與好生者出而共之纏豆藤即是毛豆藤梗上纏繞細紅絲者是也在八月採取陰乾以此藥為主妙甚一兩五錢黑豆三十粒赤豆七十粒山楂肉一兩新升麻七錢半荊芥五錢防風五錢生地黃一兩川獨活五錢甘草五錢當歸酒洗五錢赤芍五錢連翹五錢半黃連五錢桔梗五錢辰砂水飛另研一兩牛旁子炒一兩苦絲瓜長五寸留年經霜者甚妙燒灰存性二個各為極細末和勻淨沙糖拌丸李核大每服一丸濃煎甘草湯化下其前項藥須預辦精料遇春分秋分正月十五七月十五修合務在精誠忌婦女貓犬見合時向太陽祝藥曰神仙真藥體合自然嬰兒吞服天地齊年吾奉太上老君急急如律令勅一氣七遍凡初生小兒口齦發牙根白黑名曰馬牙不能食乳此與鵝口不同少緩即不能救多致夭殤急用針縛筋將白黑挑破出血用好金墨磨薄荷湯以手指碾母油發蘸墨遍口擦之勿令食乳待睡一時醒方與乳再擦之即愈牛黃抱龍丸此屢服驗方治一切急慢驚風及風熱風痰用薄荷湯磨服一丸兒小作二三次服牛膽南星八錢雄黃一錢半辰砂一錢二分鉤藤一兩半人參一錢半天竺黃二錢半茯苓一錢半牛黃二分麝香五分為末服將甘草四兩銼細用水二大碗煎成膏一盞入藥末內丸如芡實大金箔為衣陰乾藏之勿令泄氣每近微火邊上附方有驗及人所服驗者皆秘也茲具開錄以廣前方之所未備蓋人之稟養不齊病亦隨異故方各有所宜在人活變而用之耳萬靈膏香油四斤槐柳桃榴椿杏楊各二枚兩頭尖白芷赤芍大黃人參黃連白芍草烏苦參川芎生地黃川椒胎髮穿山甲熟地黃槐子杏仁各一兩當歸二兩蓖麻去皮一百三十粒巴豆去皮一百二十粒黃柏去皮一兩木鱉去皮五十個上二十二味俱㕮咀如麻豆大入香油內浸春五夏三秋七冬十日黃香十二兩黃丹二斤水飛澄火焙七次阿魏沉香丁香麝香血竭各一兩木香八兩乳香沒藥各三兩上阿魏八味俱為細末先將香油並藥入銅鍋內熬焦將藥鍋取下溫冷用生絹過淨將藥再下黃丹用槐柳等枝不住手攪此時用燒火宜慢常滴藥在水中成珠不散入黃香將鍋取下冷片時減火性乃下阿魏等八味攪勻化開貼患如神柴胡三稜飲治小兒食積柴胡神麯黃芩莪朮人參三稜枳實陳皮半夏烏梅青皮茯苓厚朴檳榔甘草姜三片草果仁二瓣水煎黃連磨積丸治遺精滑石黃柏為末秋冬煉蜜春夏麵糊為丸梧子大每服七十九滾水下治腸風下血槐角一兩水一盞煎半盅治風瘡疥瘡香油一盅豬油半兩黃柏苦參頭髮雞子皮黃蠟以上諸藥在鍋內煎化頭髮後用水銀猩紅枯礬木鱉大風子蛇床子人言硫黃雄黃花椒吳茱萸俱為細末入前藥內調搽治喉痛生瘡內用涼隔散加防風牛蒡子射干升麻治瘡吃藥生地黃黃柏黃耆防風荊芥當歸梔子白蒺藜蒼朮川芎赤芍甘草大黃水煎治頭瘡石螺去殼留肉白蠟五錢香油二兩松香五錢二味將油煮滾入白蠟松香入油內成膏治九種心痛莪朮三稜青皮陳皮益智仁桔梗藿香肉桂甘草香附檳榔為咀片白水煎孕婦不可服治痢疾梧桐子訶子肉各一兩枯礬二錢細末醋糊丸梧子大每服三十丸紅痢甘草湯下白痢乾薑湯下二次止牙疼牙痛獨活散木通玄胡羌活獨話川芎防風各一錢水煎治便毒金銀花穿山甲木鱉子去油白芨天燈心殭蠶全蠍去毒常山大黃連翹細辛牛膝漏蘆乳香沒藥藥煎熱方下此二味水酒各一盅煎服治癩瘰新剃頭時用白糖滿頭搽上後用活螺螄搗爛附上幹一層再加一層治蟲牙痛用黃蠟少許在鍋內化開用艾葉小大三皮人言少許同處為丸又用鵝繭一個盛之如疼在左放蠟丸在左右疼痛安右治嗽用桑白皮蘿蔔共一處水煎露一夜清晨溫熱服之治風牙用川烏一片放清油內蘸過燒紅放於牙上立效治痔漏瘡方蓮蕊二錢歸尾焙乾一兩大黃一兩半乳沒猩紅各一錢文蛤黑白醜各一兩為細末每服四錢獖豬肉湯下四更服之四時下蟲如無下蟲爛肉為度固齒搽牙散骨碎補炒黑一兩青鹽五錢食鹽五錢花椒五錢為末搽之頭風方川芎三錢柴胡一錢石菖蒲防風藁本生甘草升麻各一錢熟甘草生地黃酒浸各一錢黃連酒炒黃芩酒炒各四錢半為末每服二錢食後真茶湯送下楊文宇治天行熱病方柴胡熱潮將息者一錢未息者一錢半黃芩一錢半加多亦可半夏九分或一錢白茯苓九分枳實一錢未下者錢半厚朴五分頭痛胸痛者加川芎五分有斑先服青黛三錢水化服後服藥姜三片為引已經下者加大棗一個為引未下者不用中滿腫脹方人參三分白朮一錢茯苓六分黃芩五分麥冬八分木通五分厚朴三分紫蘇葉三分海金沙五分膈噎方生地黃水洗一錢三分當歸酒洗八分白芍一錢川芎七分陳皮八分紅花三分桃仁五分甘草炙五分水煎初服二三劑時定有一反反後即愈當多服一二十劑若動火加黃芩青皮各五分有別症隨宜加藥
